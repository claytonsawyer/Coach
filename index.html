};

function renderHealthSnapshot(latest, history, idSuffix='') {
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');
  const sleep = fmtHrs(getField(latest, 'sleepSecs'));
  const rhr = getField(latest, 'restingHR');
  const ctl = getField(latest, 'ctl');
  const atl = getField(latest, 'atl');
  const tsb = (ctl != null && atl != null) ? (ctl - atl) : null;
  const acwr = (ctl && atl) ? (atl/ctl) : null;
  const sleepScore = getField(latest, 'sleepScore');
  const baseReadiness = computeReadiness(latest, history);
  const adjustedReadiness = applyFeelToReadiness(baseReadiness, state.feel);
  const status = getReadinessStatus(adjustedReadiness);
  const ringRadius = 32;
  const ringCircumference = 2 * Math.PI * ringRadius;
  const ringOffset = adjustedReadiness != null ? ringCircumference * (1 - adjustedReadiness/100) : ringCircumference;

  const trend = (key, latestVal) => {
    if (latestVal == null) return null;
    const recent = history.slice(-8, -1).map(d => getField(d, key)).filter(v => v != null);
    if (recent.length < 3) return null;
    const avg = recent.reduce((a,b) => a+b, 0) / recent.length;
    const pct = ((latestVal - avg) / avg) * 100;
    return { pct, dir: pct > 2 ? 'up' : pct < -2 ? 'down' : 'flat' };
  };
  const hrvTrend = trend('hrv', hrv) || trend('hrvWeeklyAverage', hrv);
  const rhrTrend = trend('restingHR', rhr);
  const trendArrow = (t, inverse=false) => {
    if (!t) return '';
    const arrow = t.dir === 'up' ? '↑' : t.dir === 'down' ? '↓' : '→';
    let cls;
    if (t.dir === 'flat') cls = 'trend-flat';
    else if (inverse) cls = t.dir === 'up' ? 'trend-down' : 'trend-up';
    else cls = t.dir === 'up' ? 'trend-up' : 'trend-down';
    return `<div class="snap-metric-trend ${cls}">${arrow} ${Math.abs(Math.round(t.pct))}% vs avg</div>`;
  };

  let formStatus = '';
  if (tsb != null) {
    if (tsb > 5) formStatus = 'Fresh';
    else if (tsb > -10) formStatus = 'Neutral';
    else if (tsb > -20) formStatus = 'Productive';
    else formStatus = 'Fatigued';
  }

  const nowStr = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const feelNote = state.feel ? `Adjusted for "${FEEL_OPTIONS.find(o=>o.id===state.feel).label}" check-in` : '';

  const m = (key, label, value, unit, trendStr, meta) => `
    <div class="snap-metric" onclick="toggleHelp('${key}${idSuffix}')">
      <div class="snap-metric-top">
        <span class="snap-metric-label">${label}</span>
        <span class="snap-metric-help">?</span>
      </div>
      ${value == null ? `<div class="snap-metric-na">—</div>` : `<div class="snap-metric-value">${value}<span class="snap-metric-unit">${unit}</span></div>`}
      ${trendStr || (meta ? `<div class="snap-metric-meta">${meta}</div>` : '')}
      <div class="help-drawer" id="help-${key}${idSuffix}">${HELP[key]}</div>
    </div>
  `;

  return `
    <div class="snapshot">
      <div class="snapshot-header">
        <div class="snapshot-title">Health Snapshot</div>
        <div class="snapshot-time">${nowStr}</div>
      </div>
      <div class="readiness-block">
        <div class="readiness-ring">
          <svg width="76" height="76">
            <circle class="readiness-ring-bg" cx="38" cy="38" r="${ringRadius}"></circle>
            <circle class="readiness-ring-fill" cx="38" cy="38" r="${ringRadius}" stroke="${status.color}" stroke-dasharray="${ringCircumference}" stroke-dashoffset="${ringOffset}"></circle>
          </svg>
          <div class="readiness-ring-text">${adjustedReadiness != null ? adjustedReadiness : '—'}</div>
        </div>
        <div class="readiness-info">
          <div class="readiness-label">Readiness</div>
          <div class="readiness-status" style="color: ${status.color}">${status.label}</div>
          <div class="readiness-msg">${status.msg}</div>
          ${feelNote ? `<div class="readiness-msg" style="margin-top: 4px; font-size: 11px; color: var(--primary);">${feelNote}</div>` : ''}
        </div>
      </div>
      <div class="snap-grid">
        ${m('hrv', 'HRV', hrv ? Math.round(hrv) : null, 'ms', trendArrow(hrvTrend))}
        ${m('rhr', 'Resting HR', rhr, 'bpm', trendArrow(rhrTrend, true))}
        ${m('sleep', 'Sleep', sleep, 'hrs', null, sleepScore ? `Score: ${sleepScore}` : '')}
        ${m('ctl', 'Fitness', ctl != null ? Math.round(ctl) : null, '', null, 'Baseline: 219')}
        ${m('atl', 'Fatigue', atl != null ? Math.round(atl) : null, '', null, '7-day load')}
        ${m('tsb', 'Form', tsb != null ? (tsb > 0 ? '+' : '') + Math.round(tsb) : null, '', null, formStatus)}
        ${m('acwr', 'Load Ratio', acwr ? acwr.toFixed(2) : null, 'x', null, 'Cap: 1.3')}
      </div>
    </div>
  `;
}

function renderCoachCard(latest, history, activities) {
  const summary = buildSummary(latest, history, activities);
  const insights = [];

  const ctl = getField(latest, 'ctl');
  const atl = getField(latest, 'atl');
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');

  if (ctl != null) {
    const delta = Math.round(ctl - 219);
    const sign = delta >= 0 ? '+' : '';
    const color = delta >= 5 ? 'var(--green-bg)' : delta <= -10 ? 'var(--red-bg)' : 'var(--surface-3)';
    const icon = delta >= 0
      ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>'
      : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>';
    insights.push({ icon, bg: color, text: `Fitness (CTL) <strong>${Math.round(ctl)}</strong> — <strong>${sign}${delta} vs baseline</strong>. Peak was 271.` });
  }
  if (ctl && atl && ctl > 0) {
    const acwr = atl / ctl;
    if (acwr > 1.3) insights.push({ icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>', bg: 'var(--red-bg)', text: `<strong>ACWR ${acwr.toFixed(2)}</strong> — above 1.3 cap. Back off today.` });
    else if (acwr >= 0.8 && acwr <= 1.2) insights.push({ icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>', bg: 'var(--green-bg)', text: `<strong>ACWR ${acwr.toFixed(2)}</strong> — optimal zone. Build.` });
  }
  const recentHrv = history.slice(-7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  const prevHrv = history.slice(-14, -7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  if (recentHrv.length && prevHrv.length) {
    const r = recentHrv.reduce((a,b)=>a+b,0)/recentHrv.length;
    const p = prevHrv.reduce((a,b)=>a+b,0)/prevHrv.length;
    const diff = Math.round(r - p);
    if (Math.abs(diff) >= 3) {
      const up = diff > 0;
      insights.push({ icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>', bg: up ? 'var(--green-bg)' : 'var(--orange-bg)', text: `HRV <strong>${up ? 'up' : 'down'} ${Math.abs(diff)}ms</strong> vs last week — recovery ${up ? 'improving' : 'under stress'}.` });
    }
  }
  const recentLoad = history.slice(-7).map(d => getField(d, 'atl')).filter(v => v != null);
  const prevLoad = history.slice(-14, -7).map(d => getField(d, 'atl')).filter(v => v != null);
  if (recentLoad.length && prevLoad.length) {
    const r = recentLoad.reduce((a,b)=>a+b,0)/recentLoad.length;
    const p = prevLoad.reduce((a,b)=>a+b,0)/prevLoad.length;
    const pct = Math.round(((r - p) / p) * 100);
    if (Math.abs(pct) >= 5) {
      const up = pct > 0;
      insights.push({ icon: up ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>', bg: up ? 'var(--orange-bg)' : 'var(--green-bg)', text: `Weekly load <strong>${up ? 'up' : 'down'} ${Math.abs(pct)}%</strong> vs prior week — ${up ? 'watch ACWR' : 'maintain consistency'}.` });
    }
  }
  const recentSleep = history.slice(-7).map(d => getField(d, 'sleepSecs')).filter(v => v != null);
  if (recentSleep.length >= 4) {
    const avg = recentSleep.reduce((a,b)=>a+b,0)/recentSleep.length / 3600;
    if (avg < 6.5) insights.push({ icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>', bg: 'var(--red-bg)', text: `Sleep avg <strong>${avg.toFixed(1)}hrs</strong> — recovery suppressed.` });
    else if (avg >= 7.5) insights.push({ icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>', bg: 'var(--green-bg)', text: `Sleep avg <strong>${avg.toFixed(1)}hrs</strong> — solid recovery week.` });
  }

  const insightRows = insights.length
    ? insights.slice(0, 5).map(i => `
        <div class="insight-row" style="padding: 7px 0;">
          <div class="insight-icon" style="background: ${i.bg}; width: 26px; height: 26px; border-radius: 6px;">${i.icon}</div>
          <div class="insight-text" style="font-size: 12px;">${i.text}</div>
        </div>`).join('')
    : '';

  const divider = insights.length ? `<div style="height: 1px; background: var(--border); margin: 12px 0;"></div>` : '';

  return `
    <div class="ai-summary" style="margin-bottom: 12px;">
      <div class="ai-summary-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="ai-summary-icon">C</div>
          <div class="ai-summary-title">Coach's Read</div>
        </div>
        <button class="coach-button-inline" id="coach-btn" onclick="generateSession()">⚡ Ask Claude</button>
      </div>
      <div class="ai-summary-text">${summary}</div>
      ${divider}
      ${insightRows}
    </div>
  `;
}

function renderAlerts(latest) {
  let alerts = '';
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');
  if (hrv != null && hrv < 85) alerts += `<div class="alert"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-2px;margin-right:6px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>HRV at ${Math.round(hrv)}ms — below 85ms threshold. Auto-reduce intensity today.</div>`;
  if (state.feel === 'beat') alerts += `<div class="alert alert-poor"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-2px;margin-right:6px;"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>You marked yourself as beat — strong recommendation to take a true rest day.</div>`;
  else if (state.feel === 'sore') alerts += `<div class="alert"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:-2px;margin-right:6px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Sore today — session swapped to active recovery to protect your training week.</div>`;
  return alerts;
}

function buildSummary(latest, history, activities) {
  const today = new Date();
  const day = dayName(today);
  const { session, override } = getSessionForToday();
  const baseReadiness = computeReadiness(latest, history);
  const adjustedReadiness = applyFeelToReadiness(baseReadiness, state.feel);
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');
  const sleep = getField(latest, 'sleepSecs');
  const ctl = getField(latest, 'ctl');
  const atl = getField(latest, 'atl');
  const tsb = (ctl != null && atl != null) ? ctl - atl : null;

  const recentHrv = history.slice(-7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  const olderHrv = history.slice(-14, -7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  const hrvTrend = (recentHrv.length && olderHrv.length) ? ((recentHrv.reduce((a,b)=>a+b,0)/recentHrv.length) - (olderHrv.reduce((a,b)=>a+b,0)/olderHrv.length)) : null;

  let parts = [];
  parts.push(`<strong>${day}</strong> — ${session.title}.`);
  if (override) parts.push(`<span class="highlight-warn">Original plan was ${SESSIONS[day].title} but swapped based on your check-in.</span>`);

  if (ctl != null && atl != null) {
    if (tsb > 5) parts.push(`Form is <span class="highlight-good">+${Math.round(tsb)} (fresh — fitness exceeds fatigue)</span>, fitness ${Math.round(ctl)}.`);
    else if (tsb > -10) parts.push(`Form is <strong>${Math.round(tsb)} (neutral — fitness and fatigue balanced)</strong>, fitness ${Math.round(ctl)}.`);
    else if (tsb > -20) parts.push(`Form is <span class="highlight-warn">${Math.round(tsb)} (productive — building fitness)</span>, fitness ${Math.round(ctl)}.`);
    else parts.push(`Form is <span class="highlight-bad">${Math.round(tsb)} (very fatigued)</span> — body asking for recovery.`);
  }

  if (hrv != null) {
    if (hrv < 85) parts.push(`HRV at <span class="highlight-bad">${Math.round(hrv)}ms</span> is below 85ms threshold — auto intensity reduction.`);
    else if (hrvTrend != null && hrvTrend < -3) parts.push(`HRV trending down (${Math.round(hrv)}ms) — stress accumulating.`);
    else if (hrvTrend != null && hrvTrend > 3) parts.push(`HRV trending <span class="highlight-good">up</span> at ${Math.round(hrv)}ms — recovery working.`);
  }

  if (adjustedReadiness != null) {
    if (state.feel === 'sore' || state.feel === 'beat') parts.push(`Computed readiness adjusted to <span class="highlight-warn">${adjustedReadiness}/100</span> based on your check-in.`);
    else if (adjustedReadiness >= 80) parts.push(`Readiness <span class="highlight-good">${adjustedReadiness}/100</span> — green light.`);
    else if (adjustedReadiness >= 60) parts.push(`Readiness ${adjustedReadiness}/100 — execute but cap top sets 10-15% lighter.`);
    else if (adjustedReadiness >= 40) parts.push(`Readiness <span class="highlight-warn">${adjustedReadiness}/100</span> — strongly consider Zone 2 or mobility.`);
    else parts.push(`Readiness <span class="highlight-bad">${adjustedReadiness}/100</span> — rest day, non-negotiable.`);
  }

  if (sleep != null) {
    const hrs = sleep / 3600;
    if (hrs < 6) parts.push(`Only <span class="highlight-bad">${hrs.toFixed(1)}hrs</span> sleep — drop intensity 15-20%.`);
    else if (hrs >= 7.5) parts.push(`Solid <span class="highlight-good">${hrs.toFixed(1)}hrs</span> sleep gives clean foundation today.`);
  }

  if (adjustedReadiness == null && hrv == null && sleep == null) parts.push(`<em style="color: var(--text-dim);">Wellness data not syncing from Garmin — check Intervals settings.</em>`);

  // Phase context
  const planStart = new Date('2026-05-11');
  const daysSinceStart = Math.floor((today - planStart) / 86400000);
  const currentWeek = Math.min(16, Math.max(1, Math.ceil(daysSinceStart / 7)));
  const phase = currentWeek <= 8 ? 1 : currentWeek <= 13 ? 2 : 3;
  const phaseNames = { 1: 'Base & Strength', 2: 'Race Specificity', 3: 'Peak & Taper' };

  const days = Math.ceil((RACE_DATE - today) / 86400000);
  if (days <= 14) parts.push(`<span class="highlight-warn">${days} days to the Mash — race week mode.</span>`);
  else if (days <= 60) parts.push(`${days} days to the Mash. Week ${currentWeek} of 16 — Phase ${phase}: ${phaseNames[phase]}.`);
  else parts.push(`${days} days to the Mash. Phase ${phase}: ${phaseNames[phase]} (Week ${currentWeek}).`);

  // Consistency callout — reference the boom-bust pattern
  const recentActivities7d = activities.filter(a => {
    const d = new Date(a.start_date_local);
    return (today - d) < 7 * 86400000;
  });
  if (recentActivities7d.length <= 2 && days > 30) {
    parts.push(`<span class="highlight-warn">Only ${recentActivities7d.length} sessions logged this week — consistency is your biggest liability. Break the boom-bust cycle.</span>`);
  } else if (recentActivities7d.length >= 5) {
    parts.push(`<span class="highlight-good">${recentActivities7d.length} sessions this week — consistency locked in.</span>`);
  }

  // 7-day rolling HR discipline check for runs — the biggest coaching issue
  const recentRuns = recentActivities7d.filter(a => classifyActivityType(a.type) === 'run');
  if (recentRuns.length > 0) {
    const runsOverCap = recentRuns.filter(a => {
      const hr = a.icu_average_hr ?? a.average_heartrate;
      return hr && hr > 155;
    });
    if (runsOverCap.length > 0) {
      parts.push(`<span class="highlight-warn">${runsOverCap.length} of ${recentRuns.length} runs exceeded 155bpm avg — you still default to 90%+ max HR. This is the habit that loses the Mash.</span>`);
    } else if (recentRuns.length >= 2) {
      parts.push(`<span class="highlight-good">All runs under HR cap this week — discipline is building.</span>`);
    }
  }

  return parts.join(' ');
}

function renderSession() {
  const { session, override, plannedTitle } = getSessionForToday();
  const pillClass = `pill-${session.intensity}`;
  const pillLabel = { hard: 'High Intensity', moderate: 'Moderate', easy: 'Easy / Recovery', rest: 'Rest Day' }[session.intensity];
  const day = dayName(new Date());

  const exerciseRows = session.exercises.map((ex, i) => {
    const id = `${day}-${override ? 'rec' : 'plan'}-${i}`;
    const checked = state.checkedExercises[id];
    const items = [];
    if (ex.sets) items.push(`<span class="prescription-item"><span class="prescription-key">Sets</span> <span class="prescription-val">${ex.sets}</span></span>`);
    if (ex.reps) items.push(`<span class="prescription-item"><span class="prescription-key">Reps</span> <span class="prescription-val">${ex.reps}</span></span>`);
    if (ex.weight) items.push(`<span class="prescription-item"><span class="prescription-key">Load</span> <span class="prescription-val">${ex.weight}</span></span>`);
    if (ex.rest && ex.rest !== '—') items.push(`<span class="prescription-item"><span class="prescription-key">Rest</span> <span class="prescription-val">${ex.rest}</span></span>`);
    return `
      <div class="exercise ${checked ? 'checked' : ''}" id="ex-${id}">
        <div class="exercise-check ${checked ? 'checked' : ''}" id="chk-${id}" onclick="toggleExercise('${id}')"></div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-prescription">${items.join('')}</div>
          ${ex.notes ? `<div class="exercise-note">${ex.notes}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const warmupBlock = session.warmup.length ? `<div class="protocol-block"><div class="protocol-title">Warm-up</div><div class="protocol-list">${session.warmup.map(w => `<span>• ${w}</span>`).join('')}</div></div>` : '';
  const cooldownBlock = session.cooldown.length ? `<div class="protocol-block"><div class="protocol-title">Cool-down & Mobility</div><div class="protocol-list">${session.cooldown.map(c => `<span>• ${c}</span>`).join('')}</div></div>` : '';
  const fuelingBlock = session.fueling ? `<div class="protocol-block"><div class="protocol-title">Fueling</div><div class="protocol-list" style="font-size: 13px;">${session.fueling}</div></div>` : '';
  const overrideBanner = override ? `<div class="session-override-banner">↻ Original plan was ${plannedTitle} — adjusted for your check-in</div>` : '';

  return `
    <div class="session-card">
      <div class="session-tag">Today's Session · ${session.duration}</div>
      ${overrideBanner}
      <span class="session-pill ${pillClass}">${pillLabel}</span>
      <div class="session-title">${session.title}</div>
      <div class="session-detail">${session.summary}</div>
      ${warmupBlock}
      <div class="session-section">
        <div class="session-section-title">Main Work · ${session.exercises.length} ${session.exercises.length === 1 ? 'movement' : 'movements'}</div>
        ${exerciseRows}
      </div>
      ${cooldownBlock}
      ${fuelingBlock}
    </div>
  `;
}

// Generic line chart
function renderChart(history, key, title, color, days=14, height=80) {
  const data = history.slice(-days).map(d => ({ date: d.id, value: getField(d, key) })).filter(d => d.value != null);
  if (data.length < 2) return '';
  const w = 380, h = height, pad = 12;
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = (w - pad*2) / (data.length - 1);
  const points = data.map((d, i) => [pad + i * stepX, pad + (h - pad*2) * (1 - (d.value - min) / range)]);
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${path} L ${points[points.length-1][0].toFixed(1)},${h-pad} L ${pad},${h-pad} Z`;
  const change = ((data[data.length-1].value - data[0].value) / data[0].value * 100).toFixed(0);

  return `
    <div class="chart-card">
      <div class="card-header"><div class="card-title">${title}</div><div class="card-meta">${days}d · ${change > 0 ? '+' : ''}${change}%</div></div>
      <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <path d="${area}" fill="${color}" opacity="0.15"/>
        <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2" fill="${color}"/>`).join('')}
      </svg>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════════
//  PROGRESSION CARD — multi-metric weekly trend tracker
// ════════════════════════════════════════════════════════════════════

function computeWeeklyMetrics(activities, weeksBack = 8) {
  // Group activities into 7-day rolling buckets, ending at today
  const today = new Date();
  today.setHours(23, 59, 59, 999);
  const weeks = [];

  for (let w = weeksBack - 1; w >= 0; w--) {
    const weekEnd = new Date(today);
    weekEnd.setDate(today.getDate() - w * 7);
    const weekStart = new Date(weekEnd);
    weekStart.setDate(weekEnd.getDate() - 6);
    weekStart.setHours(0, 0, 0, 0);

    const weekActs = activities.filter(a => {
      const d = new Date(a.start_date_local);
      return d >= weekStart && d <= weekEnd;
    });

    // Aerobic efficiency — pace at sub-150bpm for runs
    const easyRuns = weekActs.filter(a => {
      const cl = classifyActivityType(a.type);
      const hr = a.icu_average_hr ?? a.average_heartrate;
      return cl === 'run' && hr && hr <= 152 && a.moving_time > 20*60 && a.distance > 1000;
    });
    let aeroEff = null;
    if (easyRuns.length > 0) {
      const paces = easyRuns.map(a => (a.moving_time / 60) / (a.distance / 1609.34));
      aeroEff = paces.reduce((x, y) => x + y, 0) / paces.length;
    }

    // Avg cadence for runs (single-leg normalized)
    const runsCadence = weekActs.filter(a => {
      const cl = classifyActivityType(a.type);
      const cad = a.icu_average_cadence ?? a.average_cadence;
      return cl === 'run' && cad;
    });
    let avgCadence = null;
    if (runsCadence.length > 0) {
      const cads = runsCadence.map(a => {
        const c = a.icu_average_cadence ?? a.average_cadence;
        return c < 100 ? c * 2 : c;
      });
      avgCadence = cads.reduce((x, y) => x + y, 0) / cads.length;
    }

    // Weekly volume (hours of training)
    const totalSec = weekActs.reduce((sum, a) => sum + (a.moving_time || 0), 0);
    const weeklyHrs = totalSec / 3600;

    // Avg compliance score for plan-aligned sessions
    const compliances = [];
    weekActs.forEach(a => {
      const dn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(a.start_date_local).getDay()];
      if (doesActivityMatchPlan(a.type, dn)) {
        const ana = analyzeCompliance(a, dn);
        if (ana) compliances.push(ana.pct);
      }
    });
    const avgCompliance = compliances.length > 0 ? compliances.reduce((x,y) => x+y, 0) / compliances.length : null;

    // Session count
    const sessionCount = weekActs.length;

    weeks.push({ start: weekStart, end: weekEnd, aeroEff, avgCadence, weeklyHrs, avgCompliance, sessionCount });
  }
  return weeks;
}

function renderSparkline(values, width = 100, height = 30, color = 'var(--primary)') {
  const valid = values.map((v, i) => ({ v, i })).filter(d => d.v != null);
  if (valid.length < 2) return `<div style="height:${height}px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim);">Not enough data</div>`;
  const min = Math.min(...valid.map(d => d.v));
  const max = Math.max(...valid.map(d => d.v));
  const range = max - min || 1;
  const pad = 2;
  const w = width, h = height;
  const stepX = (w - pad*2) / (values.length - 1);
  const yFor = v => pad + (h - pad*2) * (1 - (v - min) / range);

  // Build path with gaps for null values
  let path = '', area = '', firstX = null, lastX = null;
  let pen = false;
  values.forEach((v, i) => {
    const x = pad + i * stepX;
    if (v == null) { pen = false; return; }
    const y = yFor(v);
    if (!pen) {
      path += ` M ${x.toFixed(1)},${y.toFixed(1)}`;
      if (firstX == null) firstX = x;
      pen = true;
    } else {
      path += ` L ${x.toFixed(1)},${y.toFixed(1)}`;
    }
    lastX = x;
  });
  if (firstX != null && lastX != null) {
    area = `M ${firstX.toFixed(1)},${(h-pad).toFixed(1)} `;
    let drewFirst = false;
    values.forEach((v, i) => {
      const x = pad + i * stepX;
      if (v == null) return;
      const y = yFor(v);
      area += `${drewFirst ? 'L' : 'L'} ${x.toFixed(1)},${y.toFixed(1)} `;
      drewFirst = true;
    });
    area += `L ${lastX.toFixed(1)},${(h-pad).toFixed(1)} Z`;
  }

  // Highlight dot on last point
  const lastValid = [...valid].reverse()[0];
  const lastDotX = pad + lastValid.i * stepX;
  const lastDotY = yFor(lastValid.v);

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastDotX.toFixed(1)}" cy="${lastDotY.toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

function trendDirection(values, betterIsHigher = true) {
  const valid = values.filter(v => v != null);
  if (valid.length < 3) return { dir: 'flat', pct: 0 };
  // Compare last 3 weeks avg vs prior 3 weeks avg
  const recent = valid.slice(-3);
  const prior = valid.slice(-6, -3);
  if (prior.length === 0) return { dir: 'flat', pct: 0 };
  const rAvg = recent.reduce((a,b) => a+b, 0) / recent.length;
  const pAvg = prior.reduce((a,b) => a+b, 0) / prior.length;
  const pct = ((rAvg - pAvg) / pAvg) * 100;
  if (Math.abs(pct) < 2) return { dir: 'flat', pct: 0 };
  const goingUp = pct > 0;
  const improving = betterIsHigher ? goingUp : !goingUp;
  return { dir: improving ? 'up' : 'down', pct: Math.abs(Math.round(pct)) };
}

function renderProgression(activities) {
  const weeks = computeWeeklyMetrics(activities, 8);
  if (weeks.length < 2) {
    return `<div class="card"><div class="card-label">Progression</div><div style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;">Not enough data — need 2+ weeks</div></div>`;
  }

  const aeroEffs = weeks.map(w => w.aeroEff);
  const cadences = weeks.map(w => w.avgCadence);
  const volumes = weeks.map(w => w.weeklyHrs);
  const compliances = weeks.map(w => w.avgCompliance);

  // Aerobic efficiency — lower min/mi is better, so betterIsHigher = false
  const aeroTrend = trendDirection(aeroEffs, false);
  const cadTrend = trendDirection(cadences, true);
  const volTrend = trendDirection(volumes, true);
  const compTrend = trendDirection(compliances, true);

  const lastAero = [...aeroEffs].reverse().find(v => v != null);
  const lastCad = [...cadences].reverse().find(v => v != null);
  const lastVol = volumes[volumes.length - 1];
  const lastComp = [...compliances].reverse().find(v => v != null);

  const arrowFor = t => {
    if (t.dir === 'up') return `<span class="prog-arrow up">↗ +${t.pct}%</span>`;
    if (t.dir === 'down') return `<span class="prog-arrow down">↘ -${t.pct}%</span>`;
    return `<span class="prog-arrow flat">→ stable</span>`;
  };

  const rows = [
    {
      label: 'Aerobic efficiency',
      sub: 'Pace at sub-150bpm — running faster at same HR',
      value: lastAero ? `${lastAero.toFixed(1)} min/mi` : '—',
      values: aeroEffs,
      trend: aeroTrend,
      color: '#22C55E',
    },
    {
      label: 'Avg cadence',
      sub: 'Steps per minute — target 170+',
      value: lastCad ? `${Math.round(lastCad)} spm` : '—',
      values: cadences,
      trend: cadTrend,
      color: '#A78BFA',
    },
    {
      label: 'Weekly volume',
      sub: 'Total training hours — consistency over intensity',
      value: lastVol > 0 ? `${lastVol.toFixed(1)} hrs` : '0 hrs',
      values: volumes,
      trend: volTrend,
      color: '#3B82F6',
    },
    {
      label: 'Session quality',
      sub: 'Avg stimulus score on plan-aligned sessions',
      value: lastComp ? `${Math.round(lastComp)}%` : '—',
      values: compliances,
      trend: compTrend,
      color: '#F97316',
    },
  ];

  const rowsHtml = rows.map(r => `
    <div class="prog-row">
      <div class="prog-header-line">
        <div class="prog-label-block">
          <div class="prog-label">${r.label}</div>
          <div class="prog-sub">${r.sub}</div>
        </div>
        <div class="prog-value-block">
          <div class="prog-value">${r.value}</div>
          ${arrowFor(r.trend)}
        </div>
      </div>
      <div class="prog-spark">${renderSparkline(r.values, 280, 28, r.color)}</div>
    </div>
  `).join('');

  return `
    <div class="card progression-card">
      <div class="card-header">
        <div class="card-title">Progression</div>
        <div class="card-meta">Last 8 weeks</div>
      </div>
      <div class="prog-rows">${rowsHtml}</div>
    </div>
  `;
}


function renderLoadFullChart(history, days=60) {
  const data = history.slice(-days).map(d => ({ date: d.id, ctl: getField(d, 'ctl'), atl: getField(d, 'atl') })).filter(d => d.ctl != null && d.atl != null);
  if (data.length < 2) return '<div class="chart-card"><div class="card-label">Training Load</div><div style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;">Not enough load data yet</div></div>';
  const w = 800, h = 220, pad = 30;
  const allVals = data.flatMap(d => [d.ctl, d.atl]);
  const min = Math.min(...allVals);
  const max = Math.max(...allVals);
  const range = max - min || 1;
  const stepX = (w - pad*2) / (data.length - 1);
  const yFor = v => pad + (h - pad*2) * (1 - (v - min) / range);

  const ctlPoints = data.map((d, i) => [pad + i * stepX, yFor(d.ctl)]);
  const atlPoints = data.map((d, i) => [pad + i * stepX, yFor(d.atl)]);
  const ctlPath = ctlPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const atlPath = atlPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');

  const tsbAreaPoints = data.map((d, i) => [pad + i * stepX, yFor(Math.max(d.ctl, d.atl))]);
  const ctlClose = [...ctlPoints].reverse();
  const tsbArea = atlPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') +
                  ' ' + ctlClose.map(p => `L ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') + ' Z';

  const ctlEnd = data[data.length-1].ctl;
  const atlEnd = data[data.length-1].atl;
  const tsbEnd = ctlEnd - atlEnd;

  return `
    <div class="chart-card">
      <div class="card-header">
        <div>
          <div class="card-title">Training Load — ${days}d</div>
          <div style="display:flex;gap:14px;margin-top:4px;font-size:12px;color:var(--text-muted);">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);margin-right:5px;"></span>CTL ${Math.round(ctlEnd)}</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:5px;"></span>ATL ${Math.round(atlEnd)}</span>
            <span style="color:${tsbEnd > 0 ? 'var(--green)' : 'var(--orange)'};">TSB ${tsbEnd > 0 ? '+' : ''}${Math.round(tsbEnd)}</span>
          </div>
        </div>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <path d="${tsbArea}" fill="var(--orange)" opacity="0.08"/>
        <path d="${ctlPath}" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round"/>
        <path d="${atlPath}" fill="none" stroke="var(--red)" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
}

// Insights panel
function renderInsights(history, activities) {
  const insights = [];

  // Fitness trend — CTL vs baseline
  const latest = history[history.length - 1];
  if (latest) {
    const ctl = getField(latest, 'ctl');
    const atl = getField(latest, 'atl');
    if (ctl != null) {
      const delta = Math.round(ctl - 219);
      const sign = delta >= 0 ? '+' : '';
      const color = delta >= 5 ? 'var(--green-bg)' : delta <= -10 ? 'var(--red-bg)' : 'var(--surface-2)';
      const icon = delta >= 0
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>';
      insights.push({ icon, bg: color, text: `Fitness (CTL) at <strong>${Math.round(ctl)}</strong> — <strong>${sign}${delta} vs 219 baseline</strong>. Peak: 271.` });
    }
    if (ctl && atl && ctl > 0) {
      const acwr = atl / ctl;
      if (acwr > 1.3) insights.push({ icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>', bg: 'var(--red-bg)', text: `<strong>ACWR ${acwr.toFixed(2)}</strong> — above 1.3 cap. Back off today.` });
      else if (acwr >= 0.8 && acwr <= 1.2) insights.push({ icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>', bg: 'var(--green-bg)', text: `<strong>ACWR ${acwr.toFixed(2)}</strong> — optimal training zone. Build.` });
    }
  }

  // HRV trend — 7d vs previous 7d
  const recentHrv = history.slice(-7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  const prevHrv = history.slice(-14, -7).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
  if (recentHrv.length && prevHrv.length) {
    const r = recentHrv.reduce((a,b)=>a+b,0)/recentHrv.length;
    const p = prevHrv.reduce((a,b)=>a+b,0)/prevHrv.length;
    const diff = Math.round(r - p);
    if (Math.abs(diff) >= 3) {
      const up = diff > 0;
      insights.push({
        icon: up
          ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
          : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
        bg: up ? 'var(--green-bg)' : 'var(--orange-bg)',
        text: `HRV <strong>${up ? 'up' : 'down'} ${Math.abs(diff)}ms</strong> vs last week — recovery ${up ? 'improving' : 'under stress'}.`
      });
    }
  }

  // Load change last 7 days vs previous 7
  const recentLoad = history.slice(-7).map(d => getField(d, 'atl')).filter(v => v != null);
  const prevLoad = history.slice(-14, -7).map(d => getField(d, 'atl')).filter(v => v != null);
  if (recentLoad.length && prevLoad.length) {
    const r = recentLoad.reduce((a,b)=>a+b,0)/recentLoad.length;
    const p = prevLoad.reduce((a,b)=>a+b,0)/prevLoad.length;
    const pct = Math.round(((r - p) / p) * 100);
    if (Math.abs(pct) >= 5) {
      const up = pct > 0;
      insights.push({
        icon: up ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
        bg: up ? 'var(--orange-bg)' : 'var(--green-bg)',
        text: `Weekly load <strong>${up ? 'up' : 'down'} ${Math.abs(pct)}%</strong> vs prior week — ${up ? 'watch your ACWR' : 'maintain consistency'}.`
      });
    }
  }

  // Sleep this week
  const recentSleep = history.slice(-7).map(d => getField(d, 'sleepSecs')).filter(v => v != null);
  if (recentSleep.length >= 4) {
    const avg = recentSleep.reduce((a,b)=>a+b,0)/recentSleep.length / 3600;
    if (avg < 6.5) insights.push({ icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>', bg: 'var(--red-bg)', text: `Sleep averaging <strong>${avg.toFixed(1)}hrs</strong> — recovery suppressed. Gains happen in sleep.` });
    else if (avg >= 7.5) insights.push({ icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>', bg: 'var(--green-bg)', text: `Solid sleep week — <strong>${avg.toFixed(1)}hrs avg</strong>. Recovery and adaptation optimized.` });
  }

  if (!insights.length) insights.push({ icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>', bg: 'var(--surface-2)', text: 'Build more training data for personalized insights' });

  return `
    <div class="card">
      <div class="card-label">Performance Insights</div>
      ${insights.slice(0, 5).map(i => `
        <div class="insight-row">
          <div class="insight-icon" style="background: ${i.bg};">${i.icon}</div>
          <div class="insight-text">${i.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// Zone distribution from recent activities
function renderZoneDonut(activities) {
  const zoneSecs = [0, 0, 0, 0, 0];
  activities.slice(-30).forEach(a => {
    if (a.icu_zone_times) {
      a.icu_zone_times.forEach((t, i) => { if (i < 5) zoneSecs[i] += t || 0; });
    } else if (a.icu_hr_zone_times) {
      a.icu_hr_zone_times.forEach((t, i) => { if (i < 5) zoneSecs[i] += t || 0; });
    } else if (a.moving_time) {
      // Rough estimate based on activity type when zone data missing
      const mins = a.moving_time / 60;
      const t = (a.type || '').toLowerCase();
      if (t.includes('run')) { zoneSecs[1] += mins * 30; zoneSecs[2] += mins * 20; zoneSecs[3] += mins * 10; }
      else { zoneSecs[1] += mins * 40; zoneSecs[2] += mins * 15; }
    }
  });
  const total = zoneSecs.reduce((a, b) => a + b, 0);
  if (total === 0) return '<div class="card"><div class="card-label">Zone Distribution</div><div style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0;">Not enough zone data yet</div></div>';

  const colors = ['#9CA3AF', 'var(--green)', 'var(--primary)', 'var(--orange)', 'var(--red)'];
  const labels = ['Z1 Recovery', 'Z2 Endurance', 'Z3 Tempo', 'Z4 Threshold', 'Z5 VO2'];
  let cumAngle = -90;
  const arcs = zoneSecs.map((secs, i) => {
    const pct = secs / total;
    const angle = pct * 360;
    if (angle < 0.5) { return ''; }
    const start = cumAngle;
    const end = cumAngle + angle;
    cumAngle = end;
    const cx = 70, cy = 70, r = 55, ir = 35;
    const sx1 = cx + r * Math.cos(start * Math.PI / 180);
    const sy1 = cy + r * Math.sin(start * Math.PI / 180);
    const sx2 = cx + r * Math.cos(end * Math.PI / 180);
    const sy2 = cy + r * Math.sin(end * Math.PI / 180);
    const ix1 = cx + ir * Math.cos(end * Math.PI / 180);
    const iy1 = cy + ir * Math.sin(end * Math.PI / 180);
    const ix2 = cx + ir * Math.cos(start * Math.PI / 180);
    const iy2 = cy + ir * Math.sin(start * Math.PI / 180);
    const large = angle > 180 ? 1 : 0;
    return `<path d="M ${sx1.toFixed(2)} ${sy1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${sx2.toFixed(2)} ${sy2.toFixed(2)} L ${ix1.toFixed(2)} ${iy1.toFixed(2)} A ${ir} ${ir} 0 ${large} 0 ${ix2.toFixed(2)} ${iy2.toFixed(2)} Z" fill="${colors[i]}"/>`;
  }).join('');

  const legendRows = zoneSecs.map((s, i) => `
    <div class="zone-legend-row">
      <span class="zone-dot" style="background:${colors[i]};"></span>
      <span class="zone-name">${labels[i].split(' ')[0]}</span>
      <span class="zone-pct">${Math.round((s / total) * 100)}%</span>
    </div>
  `).join('');

  return `
    <div class="card">
      <div class="card-label">Zone Distribution · 30d</div>
      <div class="zone-donut-wrap">
        <svg width="140" height="140" viewBox="0 0 140 140">${arcs}</svg>
        <div class="zone-legend">${legendRows}</div>
      </div>
    </div>
  `;
}

// Weekly volume bar chart
function renderWeeklyVolume(activities) {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today = new Date();
  const weekStart = new Date(today);
  const dow = today.getDay();
  const offset = dow === 0 ? 6 : dow - 1;
  weekStart.setDate(today.getDate() - offset);
  weekStart.setHours(0,0,0,0);

  const dayMins = [0,0,0,0,0,0,0];
  activities.forEach(a => {
    const d = new Date(a.start_date_local);
    if (d >= weekStart) {
      const idx = (d.getDay() + 6) % 7;
      dayMins[idx] += (a.moving_time || 0) / 60;
    }
  });

  const max = Math.max(...dayMins, 60);
  const w = 380, h = 140, pad = 24, barW = (w - pad*2) / 7 - 8;
  const todayIdx = (dow + 6) % 7;

  const bars = dayMins.map((mins, i) => {
    const x = pad + i * ((w - pad*2) / 7) + 4;
    const barH = (mins / max) * (h - pad*2);
    const y = h - pad - barH;
    const isToday = i === todayIdx;
    const color = isToday ? 'var(--primary)' : 'var(--surface-3)';
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(barH, 2).toFixed(1)}" fill="${color}" rx="3"/>
      <text x="${(x + barW/2).toFixed(1)}" y="${h - 6}" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-family="Inter" font-weight="600">${days[i]}</text>
      ${mins > 0 ? `<text x="${(x + barW/2).toFixed(1)}" y="${(y - 4).toFixed(1)}" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-family="Inter" font-weight="600">${Math.round(mins)}</text>` : ''}
    `;
  }).join('');

  const totalHrs = (dayMins.reduce((a,b) => a+b, 0) / 60).toFixed(1);

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">This Week's Volume</div>
        <div class="card-meta">${totalHrs} hrs total</div>
      </div>
      <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${bars}</svg>
    </div>
  `;
}

// Mini sparkline for activity feed
function renderSparkline(activity) {
  // Use HR as the metric if available, else flat line
  const hr = activity.icu_average_hr ?? activity.average_heartrate;
  if (!hr) return '<svg class="activity-spark" viewBox="0 0 60 24"><line x1="0" y1="12" x2="60" y2="12" stroke="var(--border-strong)" stroke-width="1"/></svg>';
  // Generate a representative sparkline based on activity profile
  const points = [];
  const w = 60, h = 24;
  for (let i = 0; i < 12; i++) {
    const noise = Math.sin(i * 0.8 + activity.id * 0.3) * 0.3 + Math.random() * 0.2;
    const y = 4 + (h - 8) * (0.4 + noise);
    points.push([i * (w/11), Math.max(2, Math.min(h-2, y))]);
  }
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  return `<svg class="activity-spark" viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="var(--primary)" stroke-width="1.5"/></svg>`;
}

function renderActivities(activities, limit=7) {
  if (!activities.length) return '<div class="card"><div class="card-label">Recent Activities</div><div style="color:var(--text-dim);font-size:13px;padding:10px 0;">No activities yet</div></div>';
  const recent = activities.slice(-limit).reverse();
  const inner = recent.map(a => {
    const icon = sportIcon(a.type);
    const dist = a.distance ? `${fmtMiles(a.distance)} mi` : '';
    const dur = a.moving_time ? `${fmtMins(a.moving_time)} min` : '';
    const hrVal = a.icu_average_hr ?? a.average_heartrate ?? null;
    const hr = hrVal ? `${Math.round(hrVal)} bpm` : '';
    const date = a.start_date_local ? fmtShort(a.start_date_local.split('T')[0]) : '';
    const stats = [dist, dur, hr].filter(Boolean).join(' · ');
    return `
      <div class="activity">
        <div class="activity-icon">${icon}</div>
        <div class="activity-info">
          <div class="activity-name">${a.name || a.type || 'Activity'}</div>
          <div class="activity-stats">${stats}</div>
          <div class="activity-date">${date}</div>
        </div>
        ${renderSparkline(a)}
      </div>
    `;
  }).join('');
  return inner;
}

function buildClaudePrompt(latest, history, activities) {
  const today = new Date();
  const day = dayName(today);
  const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const baseReadiness = computeReadiness(latest, history);
  const adjustedReadiness = applyFeelToReadiness(baseReadiness, state.feel);
  const feelLine = state.feel ? `Self-reported state: ${FEEL_OPTIONS.find(o => o.id === state.feel).label} (${FEEL_OPTIONS.find(o => o.id === state.feel).desc})` : 'Self-reported state: not provided';

  const data = [
    `Computed Readiness: ${adjustedReadiness ?? 'unable to compute'}/100${state.feel ? ' (adjusted for self-report)' : ''}`,
    feelLine,
    `HRV: ${getField(latest, 'hrv', 'hrvWeeklyAverage') ?? 'not synced'} ms`,
    `Resting HR: ${getField(latest, 'restingHR') ?? 'not synced'} bpm`,
    `Sleep: ${fmtHrs(getField(latest, 'sleepSecs')) ?? 'not synced'} hrs`,
    `Sleep Score: ${getField(latest, 'sleepScore') ?? 'not synced'}`,
    `CTL (fitness): ${getField(latest, 'ctl') ?? 'not synced'}`,
    `ATL (fatigue): ${getField(latest, 'atl') ?? 'not synced'}`,
    `Stress: ${getField(latest, 'avgStressLevel') ?? 'not synced'}`
  ].join('\n');

  const recent = activities.slice(-7).reverse().map(a => {
    const dist = a.distance ? `${fmtMiles(a.distance)} mi` : '';
    const dur = a.moving_time ? `${fmtMins(a.moving_time)} min` : '';
    const hr = (a.icu_average_hr ?? a.average_heartrate) ? `${Math.round(a.icu_average_hr ?? a.average_heartrate)} bpm` : '';
    const date = (a.start_date_local || '').split('T')[0];
    return `${date}: ${a.type} — ${a.name || ''} (${[dist,dur,hr].filter(Boolean).join(', ')})`;
  }).join('\n') || 'No recent activities';

  return `You are the personal coach for Clayton Sawyer. Here is his full coaching brief:

${COACHING_BRIEF}

Today is ${day}, ${dateStr}.

LIVE INTERVALS.ICU DATA + SELF-REPORT:
${data}

RECENT ACTIVITIES (last 7 days):
${recent}

Important: factor his self-reported state heavily into your recommendation. If he says "sore" or "beat", recommend recovery work, NOT pushing through.

Format exactly like this:

READINESS ASSESSMENT
One straight-talking sentence on his recovery state.

TODAY'S SESSION
Specific session with sets/reps/duration/intensity.

KEY FOCUS
One specific actionable cue for today.

FUELING NOTE
One sentence on nutrition/hydration given his heavy sweat rate.

Tight and direct. No fluff.`;
}

async function generateSession(btnId='coach-btn') {
  const sorted = [...state.wellness].sort((a,b) => (a.id || '').localeCompare(b.id || ''));
  const latest = sorted[sorted.length - 1] || {};
  const prompt = buildClaudePrompt(latest, sorted, state.activities);
  try {
    await navigator.clipboard.writeText(prompt);
    document.querySelectorAll(`[id="${btnId}"]`).forEach(btn => {
      btn.innerHTML = '✓ Copied — opening Claude...';
      btn.classList.add('success');
    });
    setTimeout(() => {
      window.open(CLAUDE_PROJECT_URL, '_blank');
      setTimeout(() => {
        document.querySelectorAll(`[id="${btnId}"]`).forEach(btn => {
          btn.innerHTML = '⚡ Get AI Coach Response';
          btn.classList.remove('success');
        });
      }, 2000);
    }, 600);
  } catch (e) { alert('Could not copy. Check browser permissions.'); }
}

// ════════════════════════════════════════════════════════════════════
//  TOP-LEVEL RENDER
// ════════════════════════════════════════════════════════════════════
function render() {
  const app = $('#app');

  if (state.error === 'credentials') { app.innerHTML = renderSetup(); return; }
  if (state.error && state.error !== 'credentials') {
    app.innerHTML = `${renderHeader()}<div class="error">Could not reach Intervals.icu: ${state.error}<br><button onclick="clearCredentials()" style="margin-top: 12px; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: inherit;">Reset credentials</button></div>`;
    return;
  }
  if (!state.loaded) { app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading dashboard...</div>'; return; }

  const sorted = [...state.wellness].sort((a,b) => (a.id || '').localeCompare(b.id || ''));
  const latest = sorted[sorted.length - 1] || {};

  if (state.view === 'desktop') {
    renderDesktop(latest, sorted);
  } else {
    renderPhone(latest, sorted);
  }
  // Update performance subheader after render
  if (state.loaded) renderPerfSubdate(latest, sorted);
}

function renderPhone(latest, sorted) {
  $('#app').innerHTML = `
    ${renderHeader()}
    ${renderFeelCheckIn()}
    ${renderCoachCard(latest, sorted, state.activities)}
    ${renderAlerts(latest)}
    ${renderHealthSnapshot(latest, sorted)}
    <div class="phone-data-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
      ${renderZoneDonut(state.activities)}
      ${renderWeeklyVolume(state.activities)}
    </div>
    ${renderWeekPlanner(state.activities)}
    ${renderProgression(state.activities)}
    ${renderSession()}
    <div class="footer">
      <a href="#" onclick="clearCredentials();return false;">Reset</a> ·
      <a href="https://intervals.icu" target="_blank">Intervals.icu</a> ·
      ${state.stale ? `<span style="color:var(--orange);">⚠ Cached data${state.cacheTime ? ' from ' + state.cacheTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : ''}</span>` : `Updated ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`}
      ${state.stale ? ` · <a href="#" onclick="fetchData();return false;" style="color:var(--primary);">Retry</a>` : ''}
    </div>
    <button class="coach-button-fixed" id="coach-btn-fixed" onclick="generateSession('coach-btn-fixed')">⚡ Get AI Coach Response</button>
  `;
}

function renderDesktop(latest, sorted) {
  $('#app').innerHTML = `
    ${renderHeader()}
    <div class="desktop-grid" style="margin-bottom: 16px;">

      <!-- LEFT COLUMN: Feel + Coach + Week Planner -->
      <div class="col-4" style="display: flex; flex-direction: column; gap: 16px;">
        ${renderFeelCheckIn()}
        ${renderAlerts(latest) || ''}
        ${renderCoachCard(latest, sorted, state.activities)}
        ${renderWeekPlanner(state.activities)}
      </div>

      <!-- MIDDLE COLUMN: Health Snapshot + Insights + Zone + Volume -->
      <div class="col-4" style="display: flex; flex-direction: column; gap: 16px;">
        ${renderHealthSnapshot(latest, sorted, '-d')}
        ${renderInsights(sorted, state.activities)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          ${renderZoneDonut(state.activities)}
          ${renderWeeklyVolume(state.activities)}
        </div>
      </div>

      <!-- RIGHT COLUMN: Session -->
      <div class="col-4">${renderSession()}</div>

      <!-- FULL WIDTH: Training Load -->
      <div class="col-12">${renderLoadFullChart(sorted, 60)}</div>

      <!-- FULL WIDTH: Progression -->
      <div class="col-12">${renderProgression(state.activities)}</div>

      <!-- FULL WIDTH: Recent Activities -->
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Recent Activities</div>
            <div class="card-meta">Last 14 days</div>
          </div>
          ${renderActivities(state.activities, 14)}
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="#" onclick="clearCredentials();return false;">Reset</a> ·
      <a href="https://intervals.icu" target="_blank">Intervals.icu</a> ·
      ${state.stale ? `<span style="color:var(--orange);">⚠ Cached data${state.cacheTime ? ' from ' + state.cacheTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : ''}</span> · <a href="#" onclick="fetchData();return false;" style="color:var(--primary);">Retry</a>` : `Updated ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`}
    </div>
  `;
}

fetchData();

// Auto-refresh every 15 minutes to keep data current
setInterval(() => {
  if (state.athleteId && state.apiKey) fetchData();
}, 15 * 60 * 1000);
</script>
