<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach">
<meta name="theme-color" content="#0B0F14">
<title>Coach — Training Intelligence</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230B0F14'/%3E%3Ctext x='90' y='118' font-size='90' text-anchor='middle' fill='%23E5E7EB' font-family='Inter,-apple-system' font-weight='700'%3EC%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0B0F14;
  --surface: #121821;
  --surface-2: #1A222D;
  --surface-3: #243040;
  --border: #1E2632;
  --border-strong: #2A3544;
  --text: #E5E7EB;
  --text-muted: #9CA3AF;
  --text-dim: #6B7280;
  --primary: #3B82F6;
  --primary-bg: rgba(59,130,246,0.12);
  --green: #22C55E;
  --green-bg: rgba(34,197,94,0.12);
  --yellow: #EAB308;
  --yellow-bg: rgba(234,179,8,0.12);
  --orange: #F97316;
  --orange-bg: rgba(249,115,22,0.12);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.12);
  --purple: #A78BFA;
  --pink: #EC4899;
  --teal: #14B8A6;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.45;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════════════
   PHONE VIEW (default)
   ═══════════════════════════════════════════════════ */
body.phone-view {
  padding: max(20px, env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));
  max-width: 480px; margin: 0 auto;
}

/* ═══════════════════════════════════════════════════
   DESKTOP VIEW (when toggled on)
   ═══════════════════════════════════════════════════ */
body.desktop-view {
  padding: 24px 32px 32px;
  max-width: 1440px; margin: 0 auto;
}

/* HEADER */
.header { margin-bottom: 16px; }
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 8px;
}
.greeting { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.date { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
body.desktop-view .date { font-size: 28px; }
.subdate { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-weight: 500; }
.race-countdown {
  display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--orange); background: var(--orange-bg);
  padding: 4px 10px; border-radius: 100px;
  border: 1px solid rgba(249,115,22,0.25);
}

/* VIEW TOGGLE */
.view-toggle {
  display: inline-flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 3px; gap: 2px;
}
.view-toggle button {
  background: transparent; border: none;
  color: var(--text-muted); font-size: 12px; font-weight: 600;
  padding: 6px 12px; border-radius: 5px;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.view-toggle button.active {
  background: var(--surface-3); color: var(--text);
}
.view-toggle button svg { width: 14px; height: 14px; }

/* SETUP */
.setup { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; max-width: 480px; }
.setup h3 { font-size: 16px; margin-bottom: 12px; font-weight: 600; }
.setup label { font-size: 12px; color: var(--text-muted); display: block; margin: 12px 0 6px; font-weight: 500; }
.setup input { width: 100%; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; }
.setup input:focus { outline: none; border-color: var(--primary); }
.setup button { width: 100%; margin-top: 16px; padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
.setup-note { font-size: 11px; color: var(--text-dim); margin-top: 10px; line-height: 1.5; }

/* CARD BASE */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
}
.card-label {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-meta { font-size: 11px; color: var(--text-dim); }

/* FEEL CHECK-IN */
.feel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
.feel-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.feel-edit { font-size: 11px; color: var(--primary); font-weight: 600; cursor: pointer; }
.feel-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.feel-btn {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; transition: all 0.15s;
  font-family: inherit; color: var(--text);
}
.feel-btn:active { transform: scale(0.96); }
.feel-btn:hover { background: var(--surface-3); }
.feel-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.feel-btn-emoji { font-size: 22px; line-height: 1; }
.feel-btn-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.feel-selected { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.feel-selected-info { display: flex; align-items: center; gap: 10px; }
.feel-selected-emoji { font-size: 24px; }
.feel-selected-text { display: flex; flex-direction: column; }
.feel-selected-label { font-size: 13px; font-weight: 600; }
.feel-selected-sub { font-size: 11px; color: var(--text-muted); }

/* HEALTH SNAPSHOT */
.snapshot { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
.snapshot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.snapshot-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.snapshot-time { font-size: 11px; color: var(--text-dim); }

.readiness-block { display: flex; align-items: center; gap: 16px; padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
.readiness-ring { position: relative; width: 76px; height: 76px; flex-shrink: 0; }
.readiness-ring svg { transform: rotate(-90deg); }
.readiness-ring-bg { stroke: var(--surface-2); stroke-width: 7; fill: none; }
.readiness-ring-fill { stroke-width: 7; fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
.readiness-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.readiness-info { flex: 1; min-width: 0; }
.readiness-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.readiness-status { font-size: 17px; font-weight: 700; margin: 2px 0; }
.readiness-msg { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

.snap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.snap-metric { cursor: pointer; }
.snap-metric-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.snap-metric-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.snap-metric-help { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: var(--surface-2); color: var(--text-dim); font-size: 9px; font-weight: 700; }
.snap-metric-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
.snap-metric-na { font-size: 22px; color: var(--text-dim); font-weight: 600; line-height: 1.1; }
.snap-metric-unit { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-left: 2px; }
.snap-metric-trend { font-size: 10px; margin-top: 2px; font-weight: 600; }
.snap-metric-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-flat { color: var(--text-dim); }

.help-drawer { display: none; grid-column: 1 / -1; background: var(--surface-2); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-top: 4px; }
.help-drawer.open { display: block; }
.help-drawer strong { color: var(--text); font-weight: 600; }

/* COACH'S READ */
.ai-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.ai-summary-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.ai-summary-icon { width: 22px; height: 22px; background: var(--text); color: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.ai-summary-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
.ai-summary-text { font-size: 14px; line-height: 1.6; color: var(--text); }
.ai-summary-text strong { color: var(--text); font-weight: 600; }
.ai-summary-text .highlight-good { color: var(--green); font-weight: 600; }
.ai-summary-text .highlight-warn { color: var(--orange); font-weight: 600; }
.ai-summary-text .highlight-bad { color: var(--red); font-weight: 600; }

/* SESSION CARD */
.session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
.session-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
.session-override-banner { background: var(--primary-bg); border: 1px solid rgba(59,130,246,0.25); border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; font-size: 11px; color: var(--primary); font-weight: 600; }
.session-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; line-height: 1.25; letter-spacing: -0.01em; }
.session-detail { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 14px; }
.session-pill { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 4px; margin-bottom: 10px; }
.pill-hard { background: var(--red-bg); color: var(--red); }
.pill-moderate { background: var(--orange-bg); color: var(--orange); }
.pill-easy { background: var(--green-bg); color: var(--green); }
.pill-rest { background: rgba(156,163,175,0.15); color: var(--text-muted); }

.session-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.session-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
.exercise { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.exercise:last-child { border-bottom: none; }
.exercise-check { width: 22px; height: 22px; border: 1.5px solid var(--border-strong); border-radius: 50%; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.exercise-check.checked { background: var(--green); border-color: var(--green); }
.exercise-check.checked::after { content: '✓'; color: #000; font-size: 14px; font-weight: 700; }
.exercise-info { flex: 1; min-width: 0; }
.exercise-name { font-size: 14.5px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.exercise-prescription { font-size: 12.5px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
.prescription-item { display: inline-flex; align-items: center; gap: 3px; }
.prescription-key { color: var(--text-dim); font-weight: 500; }
.prescription-val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.exercise-note { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-style: italic; line-height: 1.4; }
.exercise.checked .exercise-name { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--border-strong); }

.protocol-block { background: var(--surface-2); border-radius: 10px; padding: 12px 14px; margin: 12px 0; }
.protocol-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; }
.protocol-list { font-size: 13px; color: var(--text); line-height: 1.8; }
.protocol-list span { display: block; }

.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 22px 0 10px; font-weight: 700; }

/* CHARTS */
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
.chart-svg { width: 100%; height: auto; display: block; }

/* ACTIVITIES */
.activity { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 6px; display: flex; gap: 12px; align-items: center; }
.activity-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
.activity-info { flex: 1; min-width: 0; }
.activity-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-stats { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
.activity-date { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.activity-spark { flex-shrink: 0; width: 60px; height: 24px; }

/* COACH BUTTON (phone) */
.coach-button-fixed { position: fixed; bottom: max(16px, env(safe-area-inset-bottom)); left: 16px; right: 16px; max-width: 448px; margin: 0 auto; background: var(--text); color: var(--bg); border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; z-index: 100; }
.coach-button-fixed:active { transform: scale(0.98); }
.coach-button-fixed.success { background: var(--green); color: #000; }

/* INLINE COACH BUTTON (desktop) */
.coach-button-inline {
  background: var(--text); color: var(--bg); border: none;
  border-radius: 10px; padding: 10px 16px;
  font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: opacity 0.15s;
}
.coach-button-inline:hover { opacity: 0.9; }
.coach-button-inline.success { background: var(--green); color: #000; }

/* ALERTS */
.alert { background: var(--orange-bg); border: 1px solid rgba(249,115,22,0.25); border-radius: 12px; padding: 11px 13px; margin-bottom: 12px; font-size: 13px; color: var(--orange); font-weight: 600; }
.alert-poor { background: var(--red-bg); border-color: rgba(239,68,68,0.25); color: var(--red); }

/* LOADING / ERROR */
.loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.25); border-radius: 12px; padding: 14px; font-size: 13px; color: var(--red); margin-bottom: 12px; line-height: 1.5; }

/* INSIGHTS PANEL */
.insight-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
.insight-row:last-child { border-bottom: none; }
.insight-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.insight-text { font-size: 13px; line-height: 1.4; }
.insight-text strong { font-weight: 600; }

/* ZONE DONUT LEGEND */
.zone-donut-wrap { display: flex; gap: 16px; align-items: center; }
.zone-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.zone-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.zone-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.zone-name { font-weight: 600; min-width: 22px; }
.zone-pct { color: var(--text-muted); font-variant-numeric: tabular-nums; }

/* WEEK PLANNER */
.week-planner { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.week-planner-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.week-planner-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.week-planner-reset { font-size: 11px; color: var(--primary); font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
.week-adherence { display: flex; gap: 12px; margin-bottom: 12px; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; align-items: center; }
.adherence-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
.adherence-ring svg { transform: rotate(-90deg); }
.adherence-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; font-weight: 700; }
.adherence-info { flex: 1; min-width: 0; }
.adherence-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.adherence-detail { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.streak-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--orange); background: var(--orange-bg); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(249,115,22,0.2); flex-shrink: 0; }
.fuel-reminder { margin-top: 10px; padding: 8px 12px; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; font-size: 11px; color: var(--primary); font-weight: 500; }

/* PROGRESSION CARD */
.progression-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.prog-rows { display: flex; flex-direction: column; gap: 14px; }
@media (min-width: 900px) {
  body.desktop-view .progression-card .prog-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
}
.prog-row { padding: 10px 12px; background: var(--surface-2); border-radius: 10px; border: 1px solid var(--border); }
.prog-header-line { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
.prog-label-block { flex: 1; min-width: 0; }
.prog-label { font-size: 12px; font-weight: 700; color: var(--text); }
.prog-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; line-height: 1.3; }
.prog-value-block { text-align: right; flex-shrink: 0; }
.prog-value { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; line-height: 1.1; }
.prog-arrow { font-size: 10px; font-weight: 700; display: inline-block; margin-top: 2px; padding: 2px 6px; border-radius: 4px; }
.prog-arrow.up { background: var(--green-bg); color: var(--green); }
.prog-arrow.down { background: var(--red-bg); color: var(--red); }
.prog-arrow.flat { background: var(--surface-3); color: var(--text-dim); }
.prog-spark { margin-top: 4px; }
.week-days { display: flex; flex-direction: column; gap: 6px; }
.week-day-row { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); transition: all 0.15s; position: relative; }
.week-day-row:hover { border-color: var(--border-strong); background: var(--surface-3); }
.week-day-row.today { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.06); }
.week-day-row.modified { border-color: rgba(249,115,22,0.35); }
.week-day-row.rest-day { opacity: 0.6; }
.week-day-label { font-size: 11px; font-weight: 700; color: var(--text-muted); min-width: 28px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
.week-day-row.today .week-day-label { color: var(--primary); }
.week-day-session { flex: 1; min-width: 0; }

const getField = (obj, ...keys) => {
  for (const k of keys) {
    if (obj && obj[k] != null && obj[k] !== '') return obj[k];
  }
  return null;
};

function computeReadiness(latest, history) {
  if (!latest) return null;
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');
  const rhr = getField(latest, 'restingHR');
  const sleepSecs = getField(latest, 'sleepSecs');
  const ctl = getField(latest, 'ctl');
  const atl = getField(latest, 'atl');
  const stress = getField(latest, 'avgStressLevel');
  const bodyBattery = getField(latest, 'bodyBatteryHighest', 'bodyBattery');

  if (hrv == null && sleepSecs == null) return null;

  let score = 50;
  let factors = 0;

  if (hrv != null) {
    const hist = history.slice(-14).map(d => getField(d, 'hrv', 'hrvWeeklyAverage')).filter(v => v != null);
    if (hist.length >= 5) {
      const avg = hist.reduce((a,b) => a+b, 0) / hist.length;
      const pct = ((hrv - avg) / avg) * 100;
      score += Math.max(-25, Math.min(25, pct * 1.25));
      factors++;
    }
  }
  if (sleepSecs != null) {
    const hrs = sleepSecs / 3600;
    score += Math.max(-15, Math.min(15, (hrs - 7) * 10));
    factors++;
  }
  if (rhr != null) {
    const hist = history.slice(-14).map(d => getField(d, 'restingHR')).filter(v => v != null);
    if (hist.length >= 5) {
      const avg = hist.reduce((a,b) => a+b, 0) / hist.length;
      const diff = rhr - avg;
      score += Math.max(-10, Math.min(10, -diff * 2));
      factors++;
    }
  }
  if (ctl != null && atl != null && ctl > 0) {
    const acwr = atl / ctl;
    if (acwr > 1.3) score -= Math.min(15, (acwr - 1.3) * 30);
    else if (acwr < 0.7) score -= 5;
    factors++;
  }
  // Factor in stress when available (lower stress = better readiness)
  if (stress != null) {
    if (stress > 50) score -= Math.min(10, (stress - 50) * 0.3);
    else if (stress < 30) score += Math.min(5, (30 - stress) * 0.3);
    factors++;
  }
  // Factor in body battery when available
  if (bodyBattery != null) {
    if (bodyBattery >= 75) score += Math.min(8, (bodyBattery - 75) * 0.4);
    else if (bodyBattery < 40) score -= Math.min(10, (40 - bodyBattery) * 0.4);
    factors++;
  }

  if (factors === 0) return null;
  return Math.max(0, Math.min(100, Math.round(score)));
}

function applyFeelToReadiness(score, feel) {
  if (score == null && feel == null) return null;
  let s = score != null ? score : 50;
  if (feel === 'fresh') s = Math.min(100, s + 8);
  else if (feel === 'sore') s = Math.max(0, s - 18);
  else if (feel === 'beat') s = Math.max(0, s - 30);
  return Math.round(s);
}

async function fetchData() {
  if (!state.athleteId || !state.apiKey) { state.error = "credentials"; render(); return; }
  const today = new Date();
  const monthAgo = new Date(today.getTime() - 90 * 86400000);
  const fmt = d => d.toISOString().split('T')[0];
  const auth = 'Basic ' + btoa('API_KEY:' + state.apiKey);

  // Load cached data immediately so we're never blank
  const cachedWellness = localStorage.getItem('cache_wellness');
  const cachedActivities = localStorage.getItem('cache_activities');
  const cacheTime = localStorage.getItem('cache_time');
  if (cachedWellness && cachedActivities) {
    try {
      const cw = JSON.parse(cachedWellness);
      const ca = JSON.parse(cachedActivities);
      if (Array.isArray(cw) && cw.length > 0) {
        state.wellness = cw;
        state.activities = Array.isArray(ca) ? ca : [];
        state.loaded = true;
        state.cacheTime = cacheTime ? new Date(parseInt(cacheTime)) : null;
        state.stale = true;
        state.error = null;
        render(); // show cached data immediately
      }
    } catch (parseErr) {
      console.warn('Cache parse failed:', parseErr);
    }
  }

  // Helper: fetch with timeout and retry
  async function fetchWithRetry(url, retries = 2, timeoutMs = 15000) {
    for (let attempt = 0; attempt <= retries; attempt++) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { headers: { Authorization: auth }, signal: controller.signal });
        clearTimeout(timeoutId);
        if (res.ok) return res;
        // 4xx errors won't be helped by retry
        if (res.status >= 400 && res.status < 500) throw new Error(`Intervals API ${res.status}`);
        // 5xx: retry
        if (attempt < retries) {
          await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
          continue;
        }
        throw new Error(`Intervals API ${res.status}`);
      } catch (e) {
        clearTimeout(timeoutId);
        if (attempt >= retries) throw e;
        await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
      }
    }
  }

  try {
    const wRes = await fetchWithRetry(`https://intervals.icu/api/v1/athlete/${state.athleteId}/wellness?oldest=${fmt(monthAgo)}&newest=${fmt(today)}`);
    const wData = await wRes.json();

    // Protection: if API returns empty array but we have cache, keep cache
    if (!Array.isArray(wData) || wData.length === 0) {
      if (state.loaded && state.wellness.length > 0) {
        state.stale = true;
        state.error = null;
        render();
        return;
      }
      throw new Error('Empty response from Intervals.icu');
    }

    state.wellness = wData;

    try {
      const aRes = await fetchWithRetry(`https://intervals.icu/api/v1/athlete/${state.athleteId}/activities?oldest=${fmt(monthAgo)}&newest=${fmt(today)}`);
      const aData = await aRes.json();
      if (Array.isArray(aData)) state.activities = aData;
    } catch (actErr) {
      // Activities fetch failed — keep cached activities if we have them
      console.warn('Activities fetch failed, using cached:', actErr.message);
    }

    state.loaded = true;
    state.error = null;
    state.stale = false;
    state.cacheTime = new Date();
    localStorage.setItem('cache_wellness', JSON.stringify(state.wellness));
    localStorage.setItem('cache_activities', JSON.stringify(state.activities));
    localStorage.setItem('cache_time', String(Date.now()));
    render();
  } catch (e) {
    console.warn('Intervals.icu fetch failed:', e.message);
    // Always prefer showing cached data over an error
    if (state.loaded && state.wellness.length > 0) {
      state.stale = true;
      state.error = null;
      render();
    } else {
      // No cache, no data — only then show the error
      state.error = e.message;
      render();
    }
  }
}

function getWeekStartMonday() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow; // shift to Monday
  const mon = new Date(today);
  mon.setDate(today.getDate() + diff);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function activitiesForDay(activities, targetDate) {
  const dateStr = targetDate.toISOString().split('T')[0];
  return activities.filter(a => {
    const aDate = (a.start_date_local || '').split('T')[0];
    return aDate === dateStr;
  });
}

// Map each planned day to expected Garmin activity types
const PLAN_EXPECTED_TYPES = {
  Monday:    ['strength', 'weight'],
  Tuesday:   ['strength', 'weight'],
  Wednesday: ['ride', 'cycling', 'run', 'swim', 'walk'], // Z2 can be any cardio
  Thursday:  ['run', 'trail'],
  Friday:    ['strength', 'weight'],
  Saturday:  ['ride', 'cycling', 'mtb', 'run'], // MTB or brick
  Sunday:    [] // rest — anything is a bonus
};

function classifyActivityType(garminType) {
  const t = (garminType || '').toLowerCase();
  if (t.includes('strength') || t.includes('weight') || t.includes('training')) return 'strength';
  if (t.includes('run') || t.includes('trail')) return 'run';
  if (t.includes('ride') || t.includes('cycl') || t.includes('mtb') || t.includes('bike') || t.includes('gravel')) return 'ride';
  if (t.includes('swim')) return 'swim';
  if (t.includes('surf') || t.includes('paddle') || t.includes('kayak') || t.includes('row')) return 'water';
  if (t.includes('hike') || t.includes('walk')) return 'walk';
  if (t.includes('yoga') || t.includes('stretch') || t.includes('pilates')) return 'mobility';
  return 'other';
}

function doesActivityMatchPlan(garminType, dayName, swap) {
  // If day has been swapped, check against the swap activity type instead
  if (swap) {
    const classified = classifyActivityType(garminType);
    const swapClassified = classifyActivityType(swap.id === 'surf' ? 'surf' :
      swap.id === 'paddle' ? 'paddle' :
      swap.id === 'swim' ? 'swim' :
      swap.id === 'mtb' ? 'ride' :
      swap.id === 'trail_run' ? 'run' :
      swap.id === 'zone2' ? 'ride' :
      swap.id === 'dirt_bike' ? 'ride' :
      swap.id === 'mobility' ? 'mobility' :
      swap.id === 'rest' ? 'rest' :
      swap.id);
    // For water activities (surf/paddle) accept water or swim classifications
    if (swap.id === 'surf' || swap.id === 'paddle') {
      return ['water', 'swim', 'run', 'walk'].includes(classified) ||
        (garminType || '').toLowerCase().includes('surf') ||
        (garminType || '').toLowerCase().includes('paddle') ||
        (garminType || '').toLowerCase().includes('kayak') ||
        (garminType || '').toLowerCase().includes('swim') ||
        (garminType || '').toLowerCase().includes('open');
    }
    // For rest day swaps, anything counts
    if (swap.id === 'rest') return true;
    // For zone2 swaps, accept any cardio
    if (swap.id === 'zone2') return ['run', 'ride', 'swim', 'water', 'walk'].includes(classified);
    // For custom swaps, just accept any logged activity
    if (swap.id === 'custom') return true;
    return classified === swapClassified;
  }
  // No swap — check against original plan
  const expected = PLAN_EXPECTED_TYPES[dayName] || [];
  if (expected.length === 0) return true;
  const classified = classifyActivityType(garminType);
  return expected.some(exp => {
    if (exp === classified) return true;
    if (exp === 'strength' && classified === 'strength') return true;
    if (exp === 'weight' && classified === 'strength') return true;
    if (exp === 'run' && classified === 'run') return true;
    if (exp === 'trail' && classified === 'run') return true;
    if (exp === 'ride' && classified === 'ride') return true;
    if (exp === 'cycling' && classified === 'ride') return true;
    if (exp === 'mtb' && classified === 'ride') return true;
    if (exp === 'swim' && classified === 'swim') return true;
    if (exp === 'walk' && classified === 'walk') return true;
    return false;
  });
}

// ════════════════════════════════════════════════════════════════════
//  TRAINING STIMULUS ANALYSIS — outcome-based, not checkbox-based
//  The question isn't "did you hit 45 min" — it's "did the session
//  deliver the intended physiological adaptation?"
// ════════════════════════════════════════════════════════════════════

const TRAINING_GOALS = {
  Monday:    { goal: 'Maximal strength + hypertrophy', stimulus: 'mechanical tension', minDur: 35, idealDur: [50, 75], hrRange: [90, 145] },
  Tuesday:   { goal: 'Upper body push strength + paddle endurance', stimulus: 'mechanical tension', minDur: 35, idealDur: [45, 70], hrRange: [90, 145] },
  Wednesday: { goal: 'Aerobic base + recovery', stimulus: 'aerobic efficiency', minDur: 25, idealDur: [35, 60], hrRange: [110, 155] },
  Thursday:  { goal: 'Aerobic endurance + cadence patterning', stimulus: 'aerobic threshold', minDur: 30, idealDur: [45, 90], hrRange: [130, 155] },
  Friday:    { goal: 'Pull strength + bicep hypertrophy', stimulus: 'mechanical tension', minDur: 35, idealDur: [45, 70], hrRange: [90, 145] },
  Saturday:  { goal: 'Race-specific endurance + fueling rehearsal', stimulus: 'prolonged aerobic', minDur: 60, idealDur: [90, 180], hrRange: [120, 160] },
  Sunday:    { goal: 'Full recovery', stimulus: 'parasympathetic', minDur: 0, idealDur: [0, 30], hrRange: [0, 120] },
};

function analyzeCompliance(activity, dayName) {
  const goals = TRAINING_GOALS[dayName];
  const plan = SESSIONS[dayName];
  if (!goals || !plan) return null;
  const classified = classifyActivityType(activity.type);
  const checks = [];

  const dur = activity.moving_time ? activity.moving_time / 60 : 0;
  const hrVal = activity.icu_average_hr ?? activity.average_heartrate ?? null;
  const maxHr = activity.icu_max_hr ?? activity.max_heartrate ?? null;
  const zones = activity.icu_hr_zone_times || activity.icu_zone_times;
  const cadence = activity.icu_average_cadence ?? activity.average_cadence;

  // ── STIMULUS SUFFICIENCY ──
  if (dur > 0) {
    if (dur >= goals.minDur) {
      const quality = dur >= goals.idealDur[0] ? 'Sufficient stimulus' : 'Minimal effective dose';
      checks.push({ label: 'Stimulus', value: `${Math.round(dur)}min`, desc: quality, pass: true, weight: 1 });
    } else {
      const highIntensity = hrVal && hrVal > goals.hrRange[1] * 0.9;
      if (highIntensity && dur >= goals.minDur * 0.7) {
        checks.push({ label: 'Stimulus', value: `${Math.round(dur)}min`, desc: 'Short but high-intensity — partial stimulus', pass: true, weight: 0.7 });
      } else {
        checks.push({ label: 'Stimulus', value: `${Math.round(dur)}min`, desc: `Below minimum effective dose (${goals.minDur}min)`, pass: false, weight: 1 });
      }
    }
  }

  // ── INTENSITY COMPLIANCE ──
  if (hrVal && goals.stimulus !== 'mechanical tension') {
    if (goals.stimulus === 'aerobic efficiency' || goals.stimulus === 'aerobic threshold') {
      const inZone = hrVal >= goals.hrRange[0] && hrVal <= goals.hrRange[1];
      if (inZone) {
        checks.push({ label: 'HR discipline', value: `${Math.round(hrVal)}bpm`, desc: 'In target zone — controlled effort', pass: true, weight: 2 });
      } else if (hrVal > goals.hrRange[1]) {
        const overBy = Math.round(hrVal - goals.hrRange[1]);
        checks.push({ label: 'HR discipline', value: `${Math.round(hrVal)}bpm`, desc: `${overBy}bpm over cap — too hard for intended adaptation`, pass: false, critical: overBy > 10, weight: 2 });
      } else {
        checks.push({ label: 'HR discipline', value: `${Math.round(hrVal)}bpm`, desc: 'Below target — consider pushing slightly harder', pass: true, weight: 1 });
      }
    }
    if (goals.stimulus === 'prolonged aerobic') {
      const pass = hrVal <= 160;
      checks.push({ label: 'Aerobic ceiling', value: `${Math.round(hrVal)}bpm`, desc: pass ? 'Sustained effort without redlining' : 'Avg too high — cramp risk on race day', pass, critical: !pass, weight: 2 });
    }
  }

  // ── ZONE DISTRIBUTION (all cardio with zone data) ──
  if (zones && zones.length >= 3) {
    const totalZ = zones.reduce((a, b) => a + (b || 0), 0);
    if (totalZ > 0) {
      const z12pct = Math.round(((zones[0] || 0) + (zones[1] || 0)) / totalZ * 100);
      const z3pct = 100 - z12pct;
      if (classified === 'run' || goals.stimulus === 'aerobic efficiency' || goals.stimulus === 'aerobic threshold') {
        const targetZ12 = goals.stimulus === 'aerobic efficiency' ? 80 : 70;
        const pass = z12pct >= targetZ12;
        checks.push({ label: 'Zone split', value: `${z12pct}% Z1-Z2`, desc: pass ? 'Polarized correctly — aerobic adaptation maximized' : `Too much Z3+ time (${z3pct}%) — defeats the aerobic purpose`, pass, critical: z3pct > 40, weight: 2 });
      } else if (goals.stimulus === 'prolonged aerobic') {
        const pass = z12pct >= 60;
        checks.push({ label: 'Zone split', value: `${z12pct}% Z1-Z2`, desc: pass ? 'Good endurance distribution' : 'Too much high-intensity — race pacing needs discipline', pass, weight: 1.5 });
      }
    }
  }

  // ── CADENCE (run) ──
  if (cadence && classified === 'run') {
    const spm = cadence < 100 ? cadence * 2 : cadence;
    if (spm >= 168) checks.push({ label: 'Cadence', value: `${Math.round(spm)}spm`, desc: 'On target — movement economy maintained', pass: true, weight: 1.5 });
    else if (spm >= 160) checks.push({ label: 'Cadence', value: `${Math.round(spm)}spm`, desc: 'Slightly low — watch for collapse on climbs', pass: true, weight: 0.8 });
    else checks.push({ label: 'Cadence', value: `${Math.round(spm)}spm`, desc: 'Collapsing under 160 — race-day failure mode', pass: false, critical: true, weight: 1.5 });
  }

  // ── CARDIAC DRIFT ──
  if (dur > 30 && hrVal && maxHr && classified !== 'strength') {
    const drift = maxHr - hrVal;
    if (drift > 30) checks.push({ label: 'Cardiac drift', value: `+${Math.round(drift)}bpm`, desc: 'Large spread — possible dehydration or sodium deficit', pass: false, critical: drift > 40, weight: 1 });
  }

  // ── RIDE CADENCE ──
  if (cadence && classified === 'ride' && dayName === 'Saturday') {
    const pass = cadence >= 72;
    checks.push({ label: 'Pedal cadence', value: `${Math.round(cadence)}rpm`, desc: pass ? 'Spinning efficiently' : 'Low cadence = cramps on Gibraltar', pass, weight: 1 });
  }

  // ── HYDRATION ──
  if (dur >= 30 && classified !== 'strength') {
    const sweatOz = Math.round(dur * 16.9 / 29.57);
    checks.push({ label: 'Est. sweat loss', value: `~${sweatOz}oz`, desc: sweatOz > 34 ? 'Heavy loss — verify you replaced 80%+' : 'Standard hydration', pass: true, info: true, weight: 0 });
  }

  if (checks.length === 0) return null;
  const scoreable = checks.filter(c => !c.info);
  let weightedPass = 0, totalWeight = 0;
  scoreable.forEach(c => { totalWeight += c.weight; if (c.pass) weightedPass += c.weight; });
  const pct = totalWeight > 0 ? Math.round((weightedPass / totalWeight) * 100) : 100;

  let verdict;
  if (pct >= 85) verdict = 'Session delivered the intended adaptation.';
  else if (pct >= 60) verdict = 'Partially effective — coaching points to address.';
  else verdict = 'Session missed its intended purpose.';

  return { checks, pct, verdict, goal: goals.goal };
}

function renderCompliance(analysis) {
  if (!analysis) return '';
  const { checks, pct, verdict } = analysis;
  const color = pct >= 85 ? 'var(--green)' : pct >= 60 ? 'var(--orange)' : 'var(--red)';
  const critical = checks.find(c => c.critical && !c.pass);
  const mainMsg = critical ? critical.desc : (checks.find(c => !c.info)?.desc || verdict);
  return `<div class="compliance-row"><span class="compliance-score" style="color:${color};">${pct}%</span> <span style="opacity:0.75;">${mainMsg}</span></div>`;
}

// ════════════════════════════════════════════════════════════════════
//  ACTIVITY DETAIL MODAL
// ════════════════════════════════════════════════════════════════════

function openActivityModal(activityId, dayName) {
  const activity = state.activities.find(a => String(a.id) === String(activityId));
  if (!activity) return;

  const classified = classifyActivityType(activity.type);
  const daySwap = state.weekSwaps[dayName];
  const matchesPlan = doesActivityMatchPlan(activity.type, dayName, daySwap);
  const analysis = matchesPlan ? analyzeCompliance(activity, dayName) : null;
  const goals = TRAINING_GOALS[dayName];
  const plan = SESSIONS[dayName];

  const dur = activity.moving_time ? activity.moving_time / 60 : 0;
  const hrVal = activity.icu_average_hr ?? activity.average_heartrate ?? null;
  const maxHr = activity.icu_max_hr ?? activity.max_heartrate ?? null;
  const dist = activity.distance ? (activity.distance / 1609.34).toFixed(1) : null;
  const calories = activity.icu_calories ?? activity.calories ?? null;
  const cadence = activity.icu_average_cadence ?? activity.average_cadence ?? null;
  const zones = activity.icu_hr_zone_times || activity.icu_zone_times;
  const elev = activity.total_elevation_gain ?? activity.icu_total_elevation_gain ?? null;
  const pace = (dist && dur > 0) ? (dur / parseFloat(dist)).toFixed(1) : null;
  const shortName = smartActivityName(activity);
  const rawName = activity.name || activity.type || 'Activity';
  const sweatOz = classified !== 'strength' && dur >= 15 ? Math.round(dur * 16.9 / 29.57) : null;

  // Zone bars
  let zoneBarHtml = '';
  if (zones && zones.length >= 3) {
    const totalZ = zones.reduce((a, b) => a + (b || 0), 0);
    if (totalZ > 0) {
      const zC = ['#6B7280', '#22C55E', '#3B82F6', '#F97316', '#EF4444'];
      const zN = ['Z1 Recovery', 'Z2 Endurance', 'Z3 Tempo', 'Z4 Threshold', 'Z5 VO2max'];
      zoneBarHtml = `
        <div class="ad-section">
          <div class="ad-section-title">Heart Rate Zones</div>
          <div class="ad-zone-bar">${zones.slice(0, 5).map((z, i) => {
            const pct = ((z || 0) / totalZ) * 100;
            return pct > 1 ? `<div class="ad-zone-seg" style="width:${pct}%;background:${zC[i]};"></div>` : '';
          }).join('')}</div>
          <div class="ad-zone-legend">${zones.slice(0, 5).map((z, i) => {
            const pct = Math.round(((z || 0) / totalZ) * 100);
            const mins = Math.round((z || 0) / 60);
            return pct >= 1 ? `<div class="ad-zone-item"><span class="ad-zone-dot" style="background:${zC[i]}"></span><span class="ad-zone-label">${zN[i].split(' ')[0]}</span><span class="ad-zone-val">${pct}% · ${mins}min</span></div>` : '';
          }).join('')}</div>
        </div>`;
    }
  } else if (hrVal && dur > 0) {
    // Estimate zone from avg HR when Garmin zone data is missing
    // Using standard zones based on ~190 max HR
    const maxHrEst = maxHr || 190;
    const z1Max = maxHrEst * 0.60, z2Max = maxHrEst * 0.70, z3Max = maxHrEst * 0.80, z4Max = maxHrEst * 0.90;
    let zoneName, zoneColor, zoneDesc;
    if (hrVal <= z1Max) { zoneName = 'Z1 Recovery'; zoneColor = '#6B7280'; zoneDesc = 'Very easy effort — active recovery zone'; }
    else if (hrVal <= z2Max) { zoneName = 'Z2 Endurance'; zoneColor = '#22C55E'; zoneDesc = 'Aerobic base building — conversational pace'; }
    else if (hrVal <= z3Max) { zoneName = 'Z3 Tempo'; zoneColor = '#3B82F6'; zoneDesc = 'Moderate effort — sustainably hard'; }
    else if (hrVal <= z4Max) { zoneName = 'Z4 Threshold'; zoneColor = '#F97316'; zoneDesc = 'Hard effort — lactate accumulating'; }
    else { zoneName = 'Z5 VO2max'; zoneColor = '#EF4444'; zoneDesc = 'Max effort — unsustainable'; }
    zoneBarHtml = `
      <div class="ad-section">
        <div class="ad-section-title">Estimated Effort Zone</div>
        <div class="ad-zone-bar"><div class="ad-zone-seg" style="width:100%;background:${zoneColor};"></div></div>
        <div class="ad-zone-legend">
          <div class="ad-zone-item"><span class="ad-zone-dot" style="background:${zoneColor}"></span><span class="ad-zone-label">${zoneName}</span></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:6px;">${zoneDesc} · Based on avg HR ${Math.round(hrVal)}bpm. Detailed zone data not available from Garmin for this activity.</div>
      </div>`;
  }

  // Analysis section
  let analysisHtml = '';
  if (analysis) {
    const color = analysis.pct >= 85 ? 'var(--green)' : analysis.pct >= 60 ? 'var(--orange)' : 'var(--red)';
    const checkRows = analysis.checks.map(c => {
      const icon = c.info ? '<span style="color:var(--primary)">ℹ</span>' : (c.pass ? '<span style="color:var(--green)">✓</span>' : (c.critical ? '<span style="color:var(--red)">✗</span>' : '<span style="color:var(--orange)">⚠</span>'));
      return `<div class="ad-check-row"><div class="ad-check-icon">${icon}</div><div class="ad-check-info"><div class="ad-check-label">${c.label}: <strong>${c.value}</strong></div><div class="ad-check-desc">${c.desc}</div></div></div>`;
    }).join('');
    analysisHtml = `
      <div class="ad-section">
        <div class="ad-section-title">Training Stimulus Analysis</div>
        <div class="ad-verdict" style="border-left: 3px solid ${color};">
          <div class="ad-verdict-score" style="color:${color}">${analysis.pct}%</div>
          <div class="ad-verdict-text"><div class="ad-verdict-goal">${analysis.goal}</div><div class="ad-verdict-line">${analysis.verdict}</div></div>
        </div>
        <div class="ad-checks">${checkRows}</div>
      </div>`;
  } else if (!matchesPlan) {
    analysisHtml = `
      <div class="ad-section">
        <div class="ad-section-title">Plan Alignment</div>
        <div class="ad-verdict" style="border-left: 3px solid var(--orange);">
          <div class="ad-verdict-score" style="color:var(--orange)">⚡</div>
          <div class="ad-verdict-text"><div class="ad-verdict-goal">Planned: ${plan.title}</div><div class="ad-verdict-line">Different activity type — logged as an unplanned swap.</div></div>
        </div>
      </div>`;
  }

  const existing = document.getElementById('activity-modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'activity-modal-overlay';
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal ad-modal">
      <div class="modal-handle"></div>
      <div class="ad-header">
        <div class="ad-type-icon">${sportIcon(activity.type)}</div>
        <div class="ad-header-info"><div class="ad-header-name">${rawName}</div><div class="ad-header-meta">${shortName} · ${activity.start_date_local ? new Date(activity.start_date_local).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : ''}</div></div>
        ${matchesPlan ? '<div class="ad-match-badge match">On Plan</div>' : '<div class="ad-match-badge swap">Swapped</div>'}
      </div>
      <div class="ad-metrics">
        ${dur ? `<div class="ad-metric"><div class="ad-metric-val">${Math.round(dur)}</div><div class="ad-metric-label">min</div></div>` : ''}
        ${dist ? `<div class="ad-metric"><div class="ad-metric-val">${dist}</div><div class="ad-metric-label">miles</div></div>` : ''}
        ${hrVal ? `<div class="ad-metric"><div class="ad-metric-val">${Math.round(hrVal)}</div><div class="ad-metric-label">avg bpm</div></div>` : ''}
        ${maxHr ? `<div class="ad-metric"><div class="ad-metric-val">${Math.round(maxHr)}</div><div class="ad-metric-label">max bpm</div></div>` : ''}
        ${elev ? `<div class="ad-metric"><div class="ad-metric-val">${Math.round(elev * 3.281)}</div><div class="ad-metric-label">ft gain</div></div>` : ''}
        ${calories ? `<div class="ad-metric"><div class="ad-metric-val">${Math.round(calories)}</div><div class="ad-metric-label">cal</div></div>` : ''}
        ${pace && classified === 'run' ? `<div class="ad-metric"><div class="ad-metric-val">${pace}</div><div class="ad-metric-label">min/mi</div></div>` : ''}
        ${cadence ? `<div class="ad-metric"><div class="ad-metric-val">${classified === 'run' ? Math.round(cadence < 100 ? cadence * 2 : cadence) : Math.round(cadence)}</div><div class="ad-metric-label">${classified === 'run' ? 'spm' : 'rpm'}</div></div>` : ''}
        ${sweatOz ? `<div class="ad-metric"><div class="ad-metric-val">~${sweatOz}</div><div class="ad-metric-label">oz sweat</div></div>` : ''}
      </div>
      ${zoneBarHtml}
      ${analysisHtml}
      <button class="modal-btn modal-btn-confirm" style="margin-top:16px;width:100%;" onclick="document.getElementById('activity-modal-overlay').remove()">Close</button>
    </div>`;
  document.body.appendChild(overlay);
}

function smartActivityName(activity) {
  const raw = activity.name || '';
  const type = (activity.type || '').toLowerCase();
  
  // Common Garmin auto-names that are useless: "San Luis Obispo County ...", "Morning Run", etc.
  const isAutoName = /^(morning|afternoon|evening|lunch|night)\s/i.test(raw) ||
                     /county|city|state|region/i.test(raw) ||
                     raw.length > 30;

  if (!isAutoName && raw.length > 0 && raw.length <= 24) return raw;

  // Build a meaningful short name from activity type
  const classified = classifyActivityType(activity.type);
  const dur = activity.moving_time ? `${fmtMins(activity.moving_time)}min` : '';
  
  const typeLabels = {
    strength: 'Strength',
    run: 'Trail Run',
    ride: 'MTB Ride',
    swim: 'Swim',
    water: 'Paddle/Surf',
    walk: 'Walk/Hike',
    mobility: 'Mobility',
    other: 'Activity'
  };
  
  // Refine run/ride labels
  let label = typeLabels[classified] || 'Activity';
  if (classified === 'run') {
    if (type.includes('trail')) label = 'Trail Run';
    else if (type.includes('treadmill')) label = 'Treadmill';
    else label = 'Run';
  }
  if (classified === 'ride') {
    if (type.includes('mtb') || type.includes('mountain')) label = 'MTB Ride';
    else if (type.includes('gravel')) label = 'Gravel Ride';
    else label = 'Ride';
  }
  
  return label;
}

function renderWeekPlanner(activities = []) {
  const today = new Date();
  const todayName = dayName(today);
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const hasAnySwap = Object.keys(state.weekSwaps).length > 0;
  const weekStart = getWeekStartMonday();

  const badgeClass = { hard: 'badge-hard', moderate: 'badge-moderate', easy: 'badge-easy', rest: 'badge-rest' };
  const badgeLabel = { hard: 'Hard', moderate: 'Mod', easy: 'Easy', rest: 'Off' };
  const dayAbbr = { Monday: 'MON', Tuesday: 'TUE', Wednesday: 'WED', Thursday: 'THU', Friday: 'FRI', Saturday: 'SAT', Sunday: 'SUN' };

  const rows = DAYS.map((day, idx) => {
    const isToday = day === todayName;
    const swap = state.weekSwaps[day];
    const planned = SESSIONS[day];
    const intensity = swap ? swap.intensity : planned.intensity;
    const title = swap ? `${swap.icon} ${swap.name}` : planned.title;
    const meta = swap ? `Swapped · was: ${planned.title}` : planned.duration;
    const isRest = intensity === 'rest' && !swap;

    // Find Garmin activities logged on this day
    const dayDate = new Date(weekStart);
    dayDate.setDate(weekStart.getDate() + idx);
    const logged = activitiesForDay(activities, dayDate);
    const isPast = dayDate.toDateString() !== today.toDateString() && dayDate < today;

    const loggedHtml = logged.map(a => {
      const dist = a.distance ? `${fmtMiles(a.distance)}mi` : '';
      const dur = a.moving_time ? `${fmtMins(a.moving_time)}min` : '';
      const hrVal = a.icu_average_hr ?? a.average_heartrate ?? null;
      const hr = hrVal ? `${Math.round(hrVal)}bpm` : '';
      const stats = [dist, dur, hr].filter(Boolean).join(' · ');
      const icon = sportIcon(a.type);
      const shortName = smartActivityName(a);
      const matchesPlan = doesActivityMatchPlan(a.type, day, swap);
      const matchIcon = matchesPlan 
        ? '<span class="day-log-check match">✓</span>' 
        : '<span class="day-log-check swap">⚡</span>';
      // Compliance analysis for matched activities
      const compliance = matchesPlan ? analyzeCompliance(a, day) : null;
      const complianceHtml = renderCompliance(compliance);
      const actId = a.id || '';
      return `
        <div class="day-log-entry day-log-clickable" onclick="event.stopPropagation();openActivityModal('${actId}','${day}')">
          <span class="day-log-icon">${icon}</span>
          <span class="day-log-name">${shortName}</span>
          ${stats ? `<span class="day-log-stats">${stats}</span>` : ''}
          ${matchIcon}
        </div>
        ${complianceHtml}
      `;
    }).join('');

    const hasLog = logged.length > 0;
    const anyMatch = hasLog && logged.some(a => doesActivityMatchPlan(a.type, day, swap));
    const doneClass = hasLog 
      ? (anyMatch ? 'has-log' : 'has-log-swap') 
      : (isPast && intensity !== 'rest' ? 'missed' : '');

    return `
      <div class="week-day-row ${isToday ? 'today' : ''} ${swap ? 'modified' : ''} ${isRest ? 'rest-day' : ''} ${doneClass}">
        <div class="week-day-main" onclick="openSwapModal('${day}')">
          <div class="week-day-label">${dayAbbr[day]}</div>
          <div class="week-day-session">
            <div class="week-day-session-name">${title}</div>
            <div class="week-day-session-meta">${meta}</div>
          </div>
          ${isToday ? '<span class="today-pill">Today</span>' : ''}
          ${swap ? `<span class="week-day-badge badge-custom">Custom</span>` : `<span class="week-day-badge ${badgeClass[intensity] || 'badge-rest'}">${badgeLabel[intensity] || 'Off'}</span>`}
          <div class="week-day-edit">›</div>
        </div>
        ${hasLog ? `<div class="day-log-entries">${loggedHtml}</div>` : ''}
      </div>
    `;
  }).join('');

  // Compute 14-day rolling adherence: looks back 14 days, counts plan-aligned vs planned sessions
  const ROLLING_DAYS = 14;
  let alignedCount = 0;
  let swappedCount = 0;
  let missedCount = 0;
  let plannedInWindow = 0;
  for (let i = 0; i < ROLLING_DAYS; i++) {
    const checkDate = new Date(today);
    checkDate.setDate(today.getDate() - i);
    checkDate.setHours(0, 0, 0, 0);
    if (checkDate > today) continue;
    const checkDayName = DAYS[(checkDate.getDay() + 6) % 7]; // Convert to Mon=0..Sun=6
    if (SESSIONS[checkDayName].intensity === 'rest') continue;
    plannedInWindow++;
    const dayLogged = activitiesForDay(activities, checkDate);
    if (dayLogged.length === 0) { missedCount++; continue; }
    // Check swap for that specific date — only current week swaps are tracked,
    // but we can check at least for this week's swap if the date is in this week
    const checkWeekStart = new Date(today);
    checkWeekStart.setDate(today.getDate() - ((today.getDay() + 6) % 7));
    checkWeekStart.setHours(0, 0, 0, 0);
    const isThisWeek = checkDate >= checkWeekStart;
    const checkSwap = isThisWeek ? state.weekSwaps[checkDayName] : null;
    const anyMatch = dayLogged.some(a => doesActivityMatchPlan(a.type, checkDayName, checkSwap));
    if (anyMatch) alignedCount++;
    else swappedCount++;
  }
  const totalCompleted = alignedCount + swappedCount;
  const adherencePct = plannedInWindow > 0 ? Math.round((alignedCount / plannedInWindow) * 100) : 0;
  const adherenceColor = adherencePct >= 80 ? 'var(--green)' : adherencePct >= 60 ? 'var(--yellow)' : 'var(--orange)';
  const adherenceRadius = 17;
  const adherenceCirc = 2 * Math.PI * adherenceRadius;
  const adherenceOffset = adherenceCirc * (1 - adherencePct / 100);
  
  // Detail line
  let detailParts = [];
  if (alignedCount > 0) detailParts.push(`${alignedCount} on plan`);
  if (swappedCount > 0) detailParts.push(`${swappedCount} swapped`);
  if (missedCount > 0) detailParts.push(`${missedCount} missed`);
  const adherenceDetail = detailParts.length ? detailParts.join(' · ') : 'No sessions yet';

  // Compute training streak (consecutive days with logged activity, going backward)
  let streak = 0;
  for (let i = 0; i < 60; i++) {
    const checkDate = new Date(today);
    checkDate.setDate(today.getDate() - i);
    // Skip rest days (Sunday)
    if (checkDate.getDay() === 0) { streak++; continue; }
    const dayActivities = activitiesForDay(activities, checkDate);
    if (dayActivities.length > 0) streak++;
    else break;
  }

  // Fuel reminder for today's session
  const todaySession = SESSIONS[todayName];
  const isLongSession = todaySession && (todaySession.intensity === 'hard' || todaySession.intensity === 'moderate');
  const fuelReminder = isLongSession ? `<div class="fuel-reminder">💧 ${todaySession.intensity === 'hard' ? 'Heavy session — 500mg sodium pre-load 30 min before. Protein + carbs within 60 min after.' : 'Trail/ride day — electrolytes + 60g carbs/hr if over 60 min. Practice race fueling.'}</div>` : '';

  return `
    <div class="week-planner">
      <div class="week-planner-header">
        <div class="week-planner-title">This Week</div>
        ${hasAnySwap ? `<button class="week-planner-reset" onclick="resetAllSwaps()">Reset all</button>` : ''}
      </div>
      <div class="week-adherence">
        <div class="adherence-ring">
          <svg width="44" height="44">
            <circle cx="22" cy="22" r="${adherenceRadius}" stroke="var(--surface-3)" stroke-width="4" fill="none"></circle>
            <circle cx="22" cy="22" r="${adherenceRadius}" stroke="${adherenceColor}" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="${adherenceCirc}" stroke-dashoffset="${adherenceOffset}" style="transform:rotate(-90deg);transform-origin:center;"></circle>
          </svg>
          <div class="adherence-ring-text">${adherencePct}%</div>
        </div>
        <div class="adherence-info">
          <div class="adherence-label">14-day adherence</div>
          <div class="adherence-detail">${adherenceDetail}</div>
        </div>
        ${streak >= 3 ? `<div class="streak-badge">🔥 ${streak}d</div>` : ''}
      </div>
      ${fuelReminder}
      <div class="week-days">${rows}</div>
    </div>
  `;
}

function renderPerfSubdate(latest, sorted) {
  const ctl = getField(latest, 'ctl');
  const atl = getField(latest, 'atl');
  const hrv = getField(latest, 'hrv', 'hrvWeeklyAverage');
  const tsb = (ctl != null && atl != null) ? ctl - atl : null;

  const today = new Date();
  const daysToRace = Math.ceil((RACE_DATE - today) / 86400000);
  const weeksToRace = Math.ceil(daysToRace / 7);

  // Compute current training week & phase
  const planStart = new Date('2026-05-11');
  const daysSinceStart = Math.floor((today - planStart) / 86400000);
  const currentWeek = Math.min(16, Math.max(1, Math.ceil(daysSinceStart / 7)));
  const phase = currentWeek <= 8 ? 1 : currentWeek <= 13 ? 2 : 3;
  const phaseName = phase === 1 ? 'Base & Strength' : phase === 2 ? 'Race Specificity' : 'Peak & Taper';

  const parts = [];
  parts.push(`Week ${currentWeek} · Phase ${phase}: ${phaseName}`);
  if (ctl != null) {
    const delta = Math.round(ctl - 219);
    const sign = delta >= 0 ? '+' : '';
    parts.push(`Fitness ${Math.round(ctl)} (${sign}${delta})`);
  }
  if (tsb != null) {
    const form = tsb > 5 ? 'Fresh' : tsb > -10 ? 'Neutral' : tsb > -20 ? 'Building' : 'Fatigued';
    parts.push(`${form}`);
  }
  if (hrv != null) {
    parts.push(`HRV ${Math.round(hrv)}ms`);
  }
  parts.push(`${daysToRace}d to Mash`);
  const el = document.getElementById('perf-subdate');
  if (el) el.textContent = parts.length ? parts.join(' · ') : 'Loading metrics...';
}

function getReadinessStatus(score) {
  if (score == null) return { color: 'var(--text-muted)', label: 'No data', dot: 'var(--text-muted)', msg: 'Tap how you feel or wait for Garmin sync' };
  if (score >= 80) return { color: 'var(--green)', label: 'Full send', dot: 'var(--green)', msg: "You're fresh — push it today" };
  if (score >= 60) return { color: 'var(--yellow)', label: 'Moderate', dot: 'var(--yellow)', msg: 'Execute session, back off top-end 10-15%' };
  if (score >= 40) return { color: 'var(--orange)', label: 'Low', dot: 'var(--orange)', msg: 'Swap hard session for Zone 2 or mobility' };
  return { color: 'var(--red)', label: 'Poor', dot: 'var(--red)', msg: 'Recovery day — non-negotiable' };
}
